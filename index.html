<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">

    <title>地圖及航跡檢視器</title>
    <style>
        body {
            font-family: Arial, sans-serif;

            height: 100vh;
            margin: 0;
            background-color: #f4f4f9;
        }

            color: #333;
        }

            background: white;
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);

        }
        .link-button {
            display: block;
            width: 250px;
            margin: 1rem 0;
            padding: 15px;

            transition: background 0.3s;

        .desktop {

        .mobile {
            background-color: #28a745;

    <div class="container">
