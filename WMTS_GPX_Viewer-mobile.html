<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>地圖瀏覽器 Pro</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap');

*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }

:root {
  --bg:       #0d0f14;
  --panel:    #13161e;
  --panel2:   #181c26;
  --border:   #1f2533;
  --accent:   #3b82f6;
  --accent2:  #06b6d4;
  --text:     #e2e8f0;
  --muted:    #64748b;
  --success:  #22c55e;
  --warn:     #f59e0b;
  --danger:   #ef4444;
  --gpx:      #ff6b35;
  --font-ui:  'Noto Sans TC', sans-serif;
  --font-mono:'Space Mono', monospace;
  --safe-t:   env(safe-area-inset-top, 0px);
  --safe-b:   env(safe-area-inset-bottom, 0px);
  --peek:     70px;
}

html, body { width:100%; height:100%; font-family:var(--font-ui); background:var(--bg); color:var(--text); overflow:hidden; position:fixed; }

/* ── Map ── */
#map { position:absolute; inset:0; z-index:1; background:var(--bg); }

/* ── Top bar ── */
.topbar {
  position:absolute; top:0; left:0; right:0; z-index:500;
  background:rgba(19,22,30,0.95); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
  padding:10px 12px; padding-top:calc(10px + var(--safe-t));
  display:flex; align-items:center; gap:8px;
}
.logo { font-family:var(--font-mono); font-size:13px; font-weight:700; color:var(--accent); letter-spacing:1.5px; white-space:nowrap; flex-shrink:0; }
.coords-pill {
  margin-left:auto; flex-shrink:0;
  font-family:var(--font-mono); font-size:10px; color:var(--muted);
  background:rgba(6,182,212,.08); border:1px solid rgba(6,182,212,.2);
  border-radius:20px; padding:3px 10px; white-space:nowrap;
}
.coords-pill span { color:var(--accent2); }

/* ── Mode FAB row (floating above sheet) ── */
.mode-fabs {
  position:absolute; z-index:498;
  right:12px;
  bottom:calc(var(--peek) + var(--safe-b) + 12px);
  display:flex; flex-direction:column; gap:8px; align-items:flex-end;
}
.fab {
  height:42px; padding:0 16px; border-radius:21px; border:none;
  font-family:var(--font-ui); font-size:13px; font-weight:700;
  cursor:pointer; display:flex; align-items:center; gap:6px;
  box-shadow:0 4px 16px rgba(0,0,0,.5);
  transition:opacity .15s, transform .1s;
  white-space:nowrap;
}
.fab:active { transform:scale(0.96); opacity:.85; }
.fab-blue   { background:var(--accent); color:#fff; }
.fab-orange { background:var(--gpx);   color:#fff; }
.fab-cyan   { background:var(--accent2);color:#000; }

/* ── Sheet backdrop ── */
.sheet-backdrop { position:absolute; inset:0; z-index:599; background:rgba(0,0,0,.5); opacity:0; pointer-events:none; transition:opacity .3s; }
.sheet-backdrop.visible { opacity:1; pointer-events:auto; }

/* ── Bottom sheet ── */
.bottom-sheet {
  position:absolute; left:0; right:0; bottom:0; z-index:600;
  background:var(--panel);
  border-radius:18px 18px 0 0; border-top:1px solid var(--border);
  display:flex; flex-direction:column;
  transform:translateY(calc(100% - var(--peek) - var(--safe-b)));
  transition:transform .35s cubic-bezier(.32,.72,0,1);
  will-change:transform; touch-action:none;
  max-height:90vh;
}
.bottom-sheet.open { transform:translateY(0); }

/* drag handle */
.handle-wrap { padding:10px 0 0; display:flex; flex-direction:column; align-items:center; gap:8px; cursor:grab; flex-shrink:0; }
.handle-bar  { width:40px; height:5px; background:var(--border); border-radius:3px; }

/* peek bar */
.peek-bar { display:flex; align-items:center; padding:0 14px 10px; gap:10px; flex-shrink:0; }
.peek-info { flex:1; font-size:12px; color:var(--muted); font-family:var(--font-mono); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.peek-info em { color:var(--accent); font-style:normal; }
.btn-toggle { height:32px; padding:0 14px; border-radius:8px; background:var(--panel2); border:1px solid var(--border); color:var(--text); font-size:12px; font-family:var(--font-ui); cursor:pointer; font-weight:600; flex-shrink:0; }
.btn-toggle:active { background:var(--border); }

/* tabs */
.sheet-tabs { display:flex; padding:0 12px; gap:5px; flex-shrink:0; }
.tab-btn {
  flex:1; height:34px; border-radius:8px; border:1px solid var(--border);
  background:var(--panel2); color:var(--muted); font-size:11px;
  font-family:var(--font-ui); cursor:pointer; font-weight:500;
  display:flex; align-items:center; justify-content:center; gap:3px;
  transition:all .15s;
}
.tab-btn.active            { background:var(--accent);  border-color:var(--accent);  color:#fff; font-weight:700; }
.tab-btn.active.t-xyz      { background:var(--accent2); border-color:var(--accent2); color:#000; }
.tab-btn.active.t-gpx      { background:var(--gpx);     border-color:var(--gpx);     color:#fff; }
.tab-btn:active { transform:scale(.97); }

/* content */
.sheet-content { flex:1; overflow:hidden; display:flex; flex-direction:column; margin-top:8px; }
.tab-panel { display:none; flex:1; flex-direction:column; overflow:hidden; }
.tab-panel.active { display:flex; }
.scroll-area {
  flex:1; overflow-y:auto; padding:10px 14px;
  padding-bottom:calc(10px + var(--safe-b));
  -webkit-overflow-scrolling:touch;
}
.scroll-area::-webkit-scrollbar { display:none; }

/* ── Input section inside panels ── */
.input-section { margin-bottom:12px; }
.input-row { display:flex; gap:8px; align-items:center; margin-bottom:6px; }
.ipt {
  height:38px; background:var(--bg); border:1px solid var(--border); border-radius:8px;
  color:var(--text); outline:none; font-family:var(--font-mono); font-size:12px;
  padding:0 12px; transition:border-color .2s; width:100%;
}
.ipt:focus { border-color:var(--accent); }
.ipt::placeholder { color:var(--muted); font-size:11px; }
.ipt-name { font-family:var(--font-ui); }
.action-btn {
  height:38px; padding:0 16px; border-radius:8px; border:none;
  font-family:var(--font-ui); font-size:13px; font-weight:700; cursor:pointer;
  white-space:nowrap; flex-shrink:0; transition:opacity .15s;
}
.action-btn:active { opacity:.8; transform:scale(.97); }
.btn-blue   { background:var(--accent);  color:#fff; }
.btn-orange { background:var(--gpx);     color:#fff; }

/* section label */
.sec-label { font-size:10px; font-weight:700; letter-spacing:.8px; text-transform:uppercase; color:var(--muted); margin-bottom:8px; display:flex; align-items:center; justify-content:space-between; }
.sec-badge { background:rgba(59,130,246,.2); color:var(--accent); border-radius:10px; padding:1px 7px; font-size:10px; }
.sec-badge-gpx { background:rgba(255,107,53,.2); color:var(--gpx); }

/* ── Tile layer cards ── */
.lyr-card {
  background:var(--panel2); border:1px solid var(--border); border-radius:10px;
  padding:11px 13px; margin-bottom:6px; transition:border-color .15s;
}
.lyr-card.active { border-color:var(--accent); background:rgba(59,130,246,.06); }
.lyr-card-top { display:flex; align-items:center; gap:9px; }
.lyr-vis { width:14px; height:14px; border-radius:3px; border:2px solid; flex-shrink:0; cursor:pointer; }
.lyr-vis.on { background:currentColor; }
.lyr-card-info { flex:1; min-width:0; cursor:pointer; }
.lyr-card-name { font-size:13px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.lyr-card-url  { font-family:var(--font-mono); font-size:9px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-top:2px; }
.lyr-type-badge { font-size:9px; padding:1px 5px; border-radius:3px; font-weight:700; margin-left:4px; vertical-align:middle; }
.badge-wmts { background:rgba(59,130,246,.2); color:#7ab3ff; }
.badge-xyz  { background:rgba(6,182,212,.2);  color:#22d3ee; }
.btn-del { width:28px; height:28px; border-radius:7px; border:1px solid transparent; background:transparent; color:var(--muted); cursor:pointer; font-size:14px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.btn-del:active { background:var(--danger); border-color:var(--danger); color:#fff; }
.opacity-section { margin-top:8px; }
.opacity-label { display:flex; justify-content:space-between; font-size:10px; color:var(--muted); margin-bottom:4px; }
.opacity-label span:last-child { color:var(--accent2); font-family:var(--font-mono); font-weight:700; }
input[type=range] { width:100%; height:4px; border-radius:2px; outline:none; border:none; background:var(--border); -webkit-appearance:none; appearance:none; cursor:pointer; }
input[type=range]::-webkit-slider-thumb { -webkit-appearance:none; width:20px; height:20px; border-radius:50%; background:var(--accent); border:2px solid #fff; box-shadow:0 1px 4px rgba(0,0,0,.4); }
input[type=range]::-moz-range-thumb { width:20px; height:20px; border-radius:50%; background:var(--accent); border:2px solid #fff; }

/* ── WMTS picker ── */
.wmts-pick-item {
  display:flex; align-items:center; gap:9px; padding:11px 13px;
  border-radius:10px; border:1px solid var(--border); margin-bottom:6px;
  cursor:pointer; background:var(--panel2); transition:all .15s; font-size:13px;
}
.wmts-pick-item:active { border-color:var(--accent); background:rgba(59,130,246,.08); }
.wmts-pick-item.added { border-color:rgba(34,197,94,.4); background:rgba(34,197,94,.05); opacity:.7; cursor:default; }
.wmts-pick-name { flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.wmts-pick-add { font-size:20px; color:var(--accent); flex-shrink:0; font-weight:700; }
.wmts-pick-item.added .wmts-pick-add { color:var(--success); font-size:14px; }

/* ── GPX ── */
.gpx-dz {
  border:2px dashed rgba(255,107,53,.3); border-radius:10px; padding:18px;
  text-align:center; cursor:pointer; font-size:13px; color:var(--muted);
  display:flex; flex-direction:column; align-items:center; gap:6px;
  margin-bottom:10px; transition:all .2s;
}
.gpx-dz:active,.gpx-dz.over { border-color:var(--gpx); background:rgba(255,107,53,.07); color:var(--gpx); }
.gpx-dz-icon { font-size:26px; }

.gpx-card { background:var(--panel2); border:1px solid rgba(255,107,53,.25); border-radius:10px; padding:11px 13px; margin-bottom:6px; }
.gpx-card-hd { display:flex; align-items:center; gap:8px; margin-bottom:5px; }
.gpx-dot { width:12px; height:12px; border-radius:50%; flex-shrink:0; }
.gpx-card-name { font-size:13px; font-weight:600; flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.gpx-stats { display:flex; gap:5px; flex-wrap:wrap; margin-bottom:7px; }
.gpx-stat { font-size:10px; color:var(--muted); background:var(--bg); border-radius:4px; padding:2px 7px; }
.gpx-stat strong { color:var(--text); }
.gpx-actions { display:flex; gap:6px; }
.gpx-act { flex:1; height:32px; border-radius:8px; font-size:12px; cursor:pointer; border:1px solid; font-family:var(--font-ui); }
.gpx-fit  { border-color:rgba(255,107,53,.4); background:rgba(255,107,53,.1); color:var(--gpx); }
.gpx-fit:active  { background:rgba(255,107,53,.25); }
.gpx-del  { border-color:rgba(239,68,68,.35); background:transparent; color:var(--danger); }
.gpx-del:active  { background:rgba(239,68,68,.15); }

/* empty state */
.empty-hint { padding:20px 10px; text-align:center; color:var(--muted); font-size:12px; line-height:1.8; }

/* max warn */
.max-warn { background:rgba(245,158,11,.1); border:1px solid rgba(245,158,11,.3); border-radius:8px; padding:8px 12px; font-size:12px; color:var(--warn); margin-bottom:8px; display:none; }
.max-warn.show { display:block; }

/* ── Toast ── */
.toast { position:fixed; bottom:calc(var(--peek) + var(--safe-b) + 14px); left:50%; transform:translateX(-50%) translateY(10px); background:var(--panel2); border:1px solid var(--border); border-radius:10px; padding:8px 18px; font-size:13px; color:var(--text); z-index:9999; opacity:0; transition:all .25s; pointer-events:none; white-space:nowrap; }
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
.toast.err { border-color:var(--danger); color:var(--danger); }
.toast.ok  { border-color:var(--success); color:var(--success); }

/* ── Leaflet ── */
.leaflet-container { background:var(--bg); }
.leaflet-control-zoom { margin-bottom:calc(var(--peek) + var(--safe-b) + 56px) !important; }
.leaflet-control-zoom a { width:38px !important; height:38px !important; line-height:38px !important; font-size:18px !important; background:rgba(19,22,30,.92) !important; color:var(--text) !important; border-color:var(--border) !important; }
.leaflet-bar { border:1px solid var(--border) !important; box-shadow:0 2px 12px rgba(0,0,0,.4) !important; }
.leaflet-control-attribution { background:rgba(13,15,20,.8) !important; color:var(--muted) !important; font-size:9px !important; margin-bottom:calc(var(--peek) + var(--safe-b)) !important; }
.leaflet-control-attribution a { color:var(--accent2) !important; }
.leaflet-control-scale-line { background:rgba(13,15,20,.8) !important; border-color:var(--muted) !important; color:var(--muted) !important; font-size:9px !important; }

/* GPX popup */
.leaflet-popup-content-wrapper { background:var(--panel) !important; border:1px solid var(--border) !important; border-radius:10px !important; color:var(--text) !important; box-shadow:0 4px 20px rgba(0,0,0,.5) !important; font-family:var(--font-ui) !important; font-size:13px !important; }
.leaflet-popup-tip { background:var(--panel) !important; }
.leaflet-popup-close-button { color:var(--muted) !important; font-size:16px !important; }
.gpx-pop-title { font-weight:700; font-size:14px; margin-bottom:6px; color:var(--gpx); }
.gpx-pop-row { display:flex; justify-content:space-between; gap:12px; margin-bottom:4px; }
.gpx-pop-key { color:var(--muted); }
.gpx-pop-val { font-weight:600; }

#gpxFileInput { display:none; }
</style>
</head>
<body>
<input type="file" id="gpxFileInput" accept=".gpx" multiple onchange="handleGpxFiles(this.files)">

<!-- Map -->
<div id="map" ondragover="dzOver(event)" ondragleave="dzLeave()" ondrop="dzDrop(event)"></div>

<!-- Top bar -->
<div class="topbar">
  <div class="logo">🗺 MapViewer Pro</div>
  <div class="coords-pill"><span id="latVal">—</span> , <span id="lngVal">—</span></div>
</div>

<!-- Backdrop -->
<div class="sheet-backdrop" id="sheetBackdrop" onclick="closeSheet()"></div>

<!-- Bottom sheet -->
<div class="bottom-sheet" id="bottomSheet">
  <div class="handle-wrap" id="handleWrap">
    <div class="handle-bar"></div>
  </div>

  <!-- Peek bar -->
  <div class="peek-bar">
    <div class="peek-info" id="peekInfo">— 請加入圖層 —</div>
    <button class="btn-toggle" id="sheetToggleBtn" onclick="toggleSheet()">管理 ▲</button>
  </div>

  <!-- Tabs: 4 tabs -->
  <div class="sheet-tabs">
    <button class="tab-btn active"  id="tab-layers"    onclick="switchTab('layers')">⬡ 圖層</button>
    <button class="tab-btn"         id="tab-wmts"      onclick="switchTab('wmts')">🔌 WMTS</button>
    <button class="tab-btn t-xyz"   id="tab-xyz"       onclick="switchTab('xyz')">🧱 XYZ</button>
    <button class="tab-btn t-gpx"   id="tab-gpx"       onclick="switchTab('gpx')">📍 GPX</button>
  </div>

  <div class="sheet-content">

    <!-- Tab: Active tile layers -->
    <div class="tab-panel active" id="panel-layers">
      <div class="scroll-area">
        <div id="maxWarn" class="max-warn">⚠️ 已達上限（8 個圖層），請先移除</div>
        <div id="tileList"><div class="empty-hint">尚無疊加圖層<br>請從 WMTS 或 XYZ 頁籤加入</div></div>
      </div>
    </div>

    <!-- Tab: WMTS -->
    <div class="tab-panel" id="panel-wmts">
      <div class="scroll-area">
        <div class="input-section">
          <div class="input-row">
            <input class="ipt" id="wmtsUrl" type="url" inputmode="url"
              placeholder="WMTS GetCapabilities 網址…"
              value="https://wmts.nlsc.gov.tw/wmts"/>
          </div>
          <button class="action-btn btn-blue" style="width:100%" onclick="loadWMTS()">🔌 解析 WMTS 圖層</button>
        </div>
        <div class="sec-label">
          可用圖層
          <span class="sec-badge" id="wmtsCount">0</span>
        </div>
        <div id="wmtsPickList"><div class="empty-hint">輸入網址並點擊「解析」</div></div>
      </div>
    </div>

    <!-- Tab: XYZ -->
    <div class="tab-panel" id="panel-xyz">
      <div class="scroll-area">
        <div class="input-section">
          <div class="input-row">
            <input class="ipt" id="xyzUrl" type="url" inputmode="url"
              placeholder="XYZ 圖磚 URL，含 {x} {y} {z}"/>
          </div>
          <div class="input-row">
            <input class="ipt ipt-name" id="xyzName" type="text" placeholder="圖層名稱（選填）"/>
          </div>
          <button class="action-btn btn-blue" style="width:100%" onclick="addXYZLayer()">＋ 加入 XYZ 圖層</button>
        </div>
        <div class="sec-label">常用 XYZ 圖資</div>
        <div class="wmts-pick-item" onclick="quickXYZ('nlsc_ortho')">
          <div class="wmts-pick-name">🛰 國土測繪・正射影像</div>
          <div class="wmts-pick-add">＋</div>
        </div>
        <div class="wmts-pick-item" onclick="quickXYZ('nlsc_emap')">
          <div class="wmts-pick-name">⛰ 國土測繪・通用電子地圖</div>
          <div class="wmts-pick-add">＋</div>
        </div>
        <div class="wmts-pick-item" onclick="quickXYZ('esri_sat')">
          <div class="wmts-pick-name">🌍 ESRI 衛星影像</div>
          <div class="wmts-pick-add">＋</div>
        </div>
        <div class="wmts-pick-item" onclick="quickXYZ('esri_topo')">
          <div class="wmts-pick-name">🗺 ESRI 地形圖</div>
          <div class="wmts-pick-add">＋</div>
        </div>
      </div>
    </div>

    <!-- Tab: GPX -->
    <div class="tab-panel" id="panel-gpx">
      <div class="scroll-area">
        <div class="gpx-dz" id="gpxDz"
          onclick="document.getElementById('gpxFileInput').click()"
          ondragover="dzOver(event)" ondragleave="dzLeave()" ondrop="dzDrop(event)">
          <div class="gpx-dz-icon">📂</div>
          <div style="font-weight:600">點擊選取 GPX 檔</div>
          <div style="font-size:11px;opacity:.6">支援多檔同時載入</div>
        </div>
        <div class="sec-label">
          已載入軌跡
          <span class="sec-badge sec-badge-gpx" id="gpxCount">0</span>
        </div>
        <div id="gpxList"><div class="empty-hint">尚無 GPX 軌跡</div></div>
      </div>
    </div>

  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ─────────────────────────────────────────────
const MAX_LAYERS  = 8;
const TILE_COLORS = ['#3b82f6','#06b6d4','#22c55e','#f59e0b','#a855f7','#ef4444','#ec4899','#14b8a6'];
const GPX_COLORS  = ['#ff6b35','#ffd166','#06d6a0','#118ab2','#e040fb','#f72585','#4cc9f0'];

const QUICK_XYZ = {
  nlsc_ortho: { name:'國土測繪・正射影像',   url:'https://wmts.nlsc.gov.tw/wmts/PHOTO2/default/GoogleMapsCompatible/{z}/{y}/{x}' },
  nlsc_emap:  { name:'國土測繪・通用電子地圖', url:'https://wmts.nlsc.gov.tw/wmts/EMAP/default/GoogleMapsCompatible/{z}/{y}/{x}'  },
  esri_sat:   { name:'ESRI 衛星影像',        url:'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}' },
  esri_topo:  { name:'ESRI 地形圖',          url:'https://server.arcgisonline.com/ArcGIS/rest/services/World_Topo_Map/MapServer/tile/{z}/{y}/{x}' },
};

// ── Map ──────────────────────────────────────
const map = L.map('map', { center:[23.6978,120.9605], zoom:8 });
L.control.scale({ imperial:false, position:'bottomleft' }).addTo(map);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution:'&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
  maxZoom:19
}).addTo(map);

map.on('mousemove', e => {
  document.getElementById('latVal').textContent = e.latlng.lat.toFixed(5);
  document.getElementById('lngVal').textContent = e.latlng.lng.toFixed(5);
});

// ── State ─────────────────────────────────────
let tileLayers   = [];
let wmtsAvail    = [];
let wmtsMeta     = {};
let gpxTracks    = [];
let tileUid      = 1;
let gpxColorIdx  = 0;
let activeLayerId= null;
let sheetOpen    = false;

// ── Toast ─────────────────────────────────────
let _tt;
function toast(msg, type='') {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = 'toast show ' + type;
  clearTimeout(_tt); _tt = setTimeout(() => { el.className = 'toast'; }, 2600);
}

// ── Sheet control ─────────────────────────────
function openSheet() {
  sheetOpen = true;
  document.getElementById('bottomSheet').classList.add('open');
  document.getElementById('sheetBackdrop').classList.add('visible');
  document.getElementById('sheetToggleBtn').textContent = '管理 ▼';
}
function closeSheet() {
  sheetOpen = false;
  document.getElementById('bottomSheet').classList.remove('open');
  document.getElementById('sheetBackdrop').classList.remove('visible');
  document.getElementById('sheetToggleBtn').textContent = '管理 ▲';
}
function toggleSheet() { sheetOpen ? closeSheet() : openSheet(); }

// Drag-to-dismiss
(function() {
  const sheet = document.getElementById('bottomSheet');
  const handle = document.getElementById('handleWrap');
  let startY = 0, dragging = false;
  function curT() { return new DOMMatrixReadOnly(getComputedStyle(sheet).transform).m42; }
  handle.addEventListener('touchstart', e => { dragging=true; startY=e.touches[0].clientY; sheet.style.transition='none'; }, {passive:true});
  document.addEventListener('touchmove', e => { if(!dragging)return; const dy=e.touches[0].clientY-startY; startY=e.touches[0].clientY; sheet.style.transform=`translateY(${Math.max(0,curT()+dy)}px)`; }, {passive:true});
  document.addEventListener('touchend', () => { if(!dragging)return; dragging=false; sheet.style.transition=''; curT()>sheet.offsetHeight*.28?closeSheet():openSheet(); });
})();

// ── Tabs ──────────────────────────────────────
function switchTab(name) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  document.getElementById('panel-' + name).classList.add('active');
}

// ── Peek info update ──────────────────────────
function updatePeek() {
  const el = document.getElementById('peekInfo');
  const lyr = tileLayers.find(l => l.id===activeLayerId) || tileLayers[tileLayers.length-1];
  if (lyr) el.innerHTML = `<em>${lyr.name}</em> [${lyr.type.toUpperCase()}] · ${gpxTracks.length} 條 GPX`;
  else if (gpxTracks.length) el.textContent = `${tileLayers.length} 個圖層 · ${gpxTracks.length} 條 GPX`;
  else el.textContent = '— 請加入圖層 —';
}

// ══════════════════════════════════════════════
//  TILE LAYERS
// ══════════════════════════════════════════════

function renderTileList() {
  const list = document.getElementById('tileList');
  document.getElementById('maxWarn').classList.toggle('show', tileLayers.length >= MAX_LAYERS);

  if (!tileLayers.length) {
    list.innerHTML = '<div class="empty-hint">尚無疊加圖層<br>請從 WMTS 或 XYZ 頁籤加入</div>';
    updatePeek(); return;
  }

  list.innerHTML = '';
  [...tileLayers].reverse().forEach(l => {
    const isActive = l.id === activeLayerId;
    const card = document.createElement('div');
    card.className = 'lyr-card' + (isActive ? ' active' : '');

    card.innerHTML = `
      <div class="lyr-card-top">
        <div class="lyr-vis ${l.visible?'on':''}" style="color:${l.color};border-color:${l.color}"
          onclick="toggleTileVis(${l.id},event)"></div>
        <div class="lyr-card-info" onclick="selectLayer(${l.id})">
          <div class="lyr-card-name">
            ${l.name}<span class="lyr-type-badge ${l.type==='wmts'?'badge-wmts':'badge-xyz'}">${l.type.toUpperCase()}</span>
          </div>
          <div class="lyr-card-url">${l.url}</div>
        </div>
        <div class="btn-del" onclick="removeTileLayer(${l.id},event)">✕</div>
      </div>
      ${isActive ? `
      <div class="opacity-section">
        <div class="opacity-label"><span>透明度</span><span id="ov_${l.id}">${Math.round(l.opacity*100)}%</span></div>
        <input type="range" min="0" max="100" value="${Math.round(l.opacity*100)}"
          style="accent-color:${l.color}" oninput="setTileOpacity(${l.id},this.value)"/>
      </div>` : ''}`;

    list.appendChild(card);
  });
  updatePeek();
}

function selectLayer(id) { activeLayerId = id; renderTileList(); }

function toggleTileVis(id, e) {
  e.stopPropagation();
  const l = tileLayers.find(x=>x.id===id); if(!l)return;
  l.visible = !l.visible;
  if (l.visible) l.lLayer.addTo(map); else map.removeLayer(l.lLayer);
  renderTileList();
}
function setTileOpacity(id, val) {
  const l = tileLayers.find(x=>x.id===id); if(!l)return;
  l.opacity = val/100; l.lLayer.setOpacity(l.opacity);
  const el = document.getElementById('ov_'+id); if(el) el.textContent = val+'%';
}
function removeTileLayer(id, e) {
  e.stopPropagation();
  const idx = tileLayers.findIndex(x=>x.id===id); if(idx<0)return;
  map.removeLayer(tileLayers[idx].lLayer); tileLayers.splice(idx,1);
  if(activeLayerId===id) activeLayerId = tileLayers.length ? tileLayers[tileLayers.length-1].id : null;
  renderTileList(); updateWMTSPickList(); toast('圖層已移除');
}

function addTileLayerToMap(url, name, type, opts={}) {
  if (tileLayers.length >= MAX_LAYERS) { toast(`已達上限（${MAX_LAYERS} 個）`,'err'); return null; }
  const color = TILE_COLORS[tileLayers.length % TILE_COLORS.length];
  const lLayer = L.tileLayer(url, { maxZoom:20, tileSize:256, opacity:1, attribution:name, ...opts }).addTo(map);
  gpxTracks.forEach(t => t.layerGroup.bringToFront());
  const id = tileUid++;
  tileLayers.push({ id, name, url, type, lLayer, visible:true, opacity:1, color });
  activeLayerId = id;
  renderTileList();
  return id;
}

// ══════════════════════════════════════════════
//  XYZ
// ══════════════════════════════════════════════

function normalizeXYZ(url) {
  return url.replace(/\{\$x\}/gi,'{x}').replace(/\{\$y\}/gi,'{y}').replace(/\{\$z\}/gi,'{z}').replace(/\{\$s\}/gi,'{s}');
}

function addXYZLayer() {
  const raw  = document.getElementById('xyzUrl').value.trim();
  let   name = document.getElementById('xyzName').value.trim();
  if (!raw) { toast('請輸入圖磚 URL','err'); return; }
  const url  = normalizeXYZ(raw);
  if (!url.includes('{x}')||!url.includes('{y}')||!url.includes('{z}')) { toast('URL 需包含 {x}、{y}、{z}','err'); return; }
  if (!name) name = '圖層 ' + tileUid;
  const opts = {};
  if (url.includes('{s}')) {
    if (/google\.com/.test(url)) opts.subdomains=['0','1','2','3'];
    else if (/tianditu/.test(url)) opts.subdomains=['0','1','2','3','4','5','6','7'];
    else opts.subdomains=['a','b','c'];
  }
  if (addTileLayerToMap(url, name, 'xyz', opts)) {
    document.getElementById('xyzUrl').value = '';
    document.getElementById('xyzName').value = '';
    toast(`✓ 已加入：${name}`,'ok');
    switchTab('layers');
  }
}

function quickXYZ(key) {
  const q = QUICK_XYZ[key]; if(!q)return;
  if (tileLayers.some(l=>l.url===q.url)) { toast(`「${q.name}」已在地圖上`,'err'); return; }
  if (addTileLayerToMap(q.url, q.name, 'xyz')) {
    toast(`✓ 已加入：${q.name}`,'ok');
    switchTab('layers'); openSheet();
  }
}

// ══════════════════════════════════════════════
//  WMTS
// ══════════════════════════════════════════════

function getText(el,tag){const n=el.querySelector(tag);return n?n.textContent.trim():'';}

function parseCapabilities(xmlText){
  const xml=new DOMParser().parseFromString(xmlText,'text/xml'),layers=[];
  xml.querySelectorAll('Layer').forEach(layer=>{
    const id=getText(layer,'Identifier')||getText(layer,'ows\\:Identifier');if(!id)return;
    const title=getText(layer,'Title')||getText(layer,'ows\\:Title')||id;
    const formats=[...layer.querySelectorAll('Format')].map(f=>f.textContent.trim());
    const tmsLinks=[...layer.querySelectorAll('TileMatrixSetLink')].map(t=>getText(t,'TileMatrixSet')||getText(t,'ows\\:TileMatrixSet'));
    const styles=[...layer.querySelectorAll('Style')].map(s=>getText(s,'Identifier')||getText(s,'ows\\:Identifier'));
    let bbox=null;
    const bboxEl=layer.querySelector('WGS84BoundingBox')||layer.querySelector('BoundingBox');
    if(bboxEl){const lc=getText(bboxEl,'LowerCorner'),uc=getText(bboxEl,'UpperCorner');if(lc&&uc){const[x0,y0]=lc.split(' ').map(Number),[x1,y1]=uc.split(' ').map(Number);bbox=[[y0,x0],[y1,x1]];}}
    layers.push({id,title,formats,tmsLinks,styles,bbox});
  });
  const resourceUrls={};
  xml.querySelectorAll('ResourceURL').forEach(r=>{const l=r.closest('Layer');if(!l)return;const id=getText(l,'Identifier')||getText(l,'ows\\:Identifier');if(!resourceUrls[id])resourceUrls[id]=r.getAttribute('template');});
  const opEl=xml.querySelector('OperationsMetadata Operation[name="GetTile"]')||xml.querySelector('Operation[name="GetTile"]');
  let kvpUrl='';if(opEl){const g=opEl.querySelector('Get');if(g)kvpUrl=g.getAttribute('xlink:href')||'';}
  return{layers,resourceUrls,kvpUrl};
}

function buildWMTSTileUrl(baseUrl,layerId,style,tms,format){
  const url=baseUrl.split('?')[0].replace(/\/+$/,'');
  if(url.includes('{TileMatrix}')||url.includes('{z}'))return url;
  return`${url}?SERVICE=WMTS&REQUEST=GetTile&VERSION=1.0.0&LAYER=${encodeURIComponent(layerId)}&STYLE=${encodeURIComponent(style||'default')}&TILEMATRIXSET=${encodeURIComponent(tms||'GoogleMapsCompatible')}&TILEMATRIX={z}&TILEROW={y}&TILECOL={x}&FORMAT=${encodeURIComponent(format||'image/png')}`;
}

async function fetchCapabilities(url){
  try{const r=await fetch(url,{mode:'cors',signal:AbortSignal.timeout(10000)});if(r.ok)return await r.text();}catch(_){}
  for(const p of[`https://corsproxy.io/?${encodeURIComponent(url)}`,`https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`]){
    try{const r=await fetch(p,{signal:AbortSignal.timeout(12000)});if(r.ok)return await r.text();}catch(_){}
  }
  throw new Error('無法取得 Capabilities');
}

async function loadWMTS() {
  const url = document.getElementById('wmtsUrl').value.trim();
  if(!url){toast('請輸入 WMTS 網址','err');return;}
  const capUrl=url.includes('?')?(url.toLowerCase().includes('getcapabilities')?url:url+'&SERVICE=WMTS&REQUEST=GetCapabilities&VERSION=1.0.0'):url+'?SERVICE=WMTS&REQUEST=GetCapabilities&VERSION=1.0.0';
  toast('正在解析 WMTS…'); document.activeElement.blur();
  try{
    const xmlText=await fetchCapabilities(capUrl);
    const{layers,resourceUrls,kvpUrl}=parseCapabilities(xmlText);
    if(!layers.length)throw new Error('未找到圖層');
    wmtsAvail=layers; wmtsMeta={baseUrl:url,resourceUrls,kvpUrl};
    document.getElementById('wmtsCount').textContent=layers.length;
    updateWMTSPickList();
    toast(`✓ 解析完成，共 ${layers.length} 個圖層`,'ok');
  }catch(err){
    toast('解析失敗：'+err.message,'err');
    document.getElementById('wmtsPickList').innerHTML=`<div class="empty-hint" style="color:var(--danger)">⚠️ ${err.message}</div>`;
  }
}

function updateWMTSPickList(){
  const list=document.getElementById('wmtsPickList');
  if(!wmtsAvail.length){list.innerHTML='<div class="empty-hint">輸入網址並點擊「解析」</div>';return;}
  list.innerHTML='';
  wmtsAvail.forEach(layer=>{
    const added=tileLayers.some(l=>l.url&&l.url.includes(layer.id));
    const item=document.createElement('div');
    item.className='wmts-pick-item'+(added?' added':'');
    item.innerHTML=`<div class="wmts-pick-name">${layer.title}</div><div class="wmts-pick-add">${added?'✓':'＋'}</div>`;
    if(!added) item.onclick=()=>addWMTSLayer(layer);
    list.appendChild(item);
  });
}

function addWMTSLayer(layer){
  const style=layer.styles[0]||'default',tms=layer.tmsLinks[0]||'GoogleMapsCompatible';
  const fmt=layer.formats.find(f=>f.includes('png')||f.includes('jpeg'))||layer.formats[0]||'image/png';
  const{baseUrl,resourceUrls,kvpUrl}=wmtsMeta;
  let tileUrl;
  if(resourceUrls[layer.id]){tileUrl=resourceUrls[layer.id].replace('{TileMatrix}','{z}').replace('{TileRow}','{y}').replace('{TileCol}','{x}').replace('{Style}',style).replace('{TileMatrixSet}',tms);}
  else{tileUrl=buildWMTSTileUrl(kvpUrl||baseUrl,layer.id,style,tms,fmt);}
  if(addTileLayerToMap(tileUrl,layer.title,'wmts')){
    if(layer.bbox){try{map.fitBounds(layer.bbox);}catch(_){}}
    updateWMTSPickList();
    toast(`✓ 已加入：${layer.title}`,'ok');
    switchTab('layers');
  }
}

// ══════════════════════════════════════════════
//  GPX
// ══════════════════════════════════════════════

function dzOver(e){e.preventDefault();document.getElementById('gpxDz').classList.add('over');}
function dzLeave(){document.getElementById('gpxDz').classList.remove('over');}
function dzDrop(e){
  e.preventDefault();dzLeave();
  const files=[...e.dataTransfer.files].filter(f=>f.name.toLowerCase().endsWith('.gpx'));
  if(!files.length){toast('請放入 .gpx 檔案','err');return;}
  handleGpxFiles(files);
}
function handleGpxFiles(files){
  [...files].forEach(f=>{const r=new FileReader();r.onload=e=>parseAndAddGpx(f.name,e.target.result);r.readAsText(f);});
}

function parseAndAddGpx(filename,xmlText){
  const xml=new DOMParser().parseFromString(xmlText,'text/xml');
  const color=GPX_COLORS[gpxColorIdx%GPX_COLORS.length];gpxColorIdx++;
  const trackName=xml.querySelector('name')?.textContent?.trim()||filename.replace(/\.gpx$/i,'');
  const allSegments=[];
  xml.querySelectorAll('trk trkseg').forEach(seg=>{const pts=[...seg.querySelectorAll('trkpt')].map(pt=>({lat:parseFloat(pt.getAttribute('lat')),lon:parseFloat(pt.getAttribute('lon')),ele:parseFloat(pt.querySelector('ele')?.textContent??0),time:pt.querySelector('time')?.textContent??null})).filter(p=>!isNaN(p.lat)&&!isNaN(p.lon));if(pts.length)allSegments.push(pts);});
  xml.querySelectorAll('rte').forEach(rte=>{const pts=[...rte.querySelectorAll('rtept')].map(pt=>({lat:parseFloat(pt.getAttribute('lat')),lon:parseFloat(pt.getAttribute('lon')),ele:parseFloat(pt.querySelector('ele')?.textContent??0),time:null})).filter(p=>!isNaN(p.lat)&&!isNaN(p.lon));if(pts.length)allSegments.push(pts);});
  const waypoints=[...xml.querySelectorAll('wpt')].map(wpt=>({lat:parseFloat(wpt.getAttribute('lat')),lon:parseFloat(wpt.getAttribute('lon')),name:wpt.querySelector('name')?.textContent?.trim()??'',ele:parseFloat(wpt.querySelector('ele')?.textContent??0)})).filter(p=>!isNaN(p.lat)&&!isNaN(p.lon));
  const allPts=allSegments.flat();
  if(!allPts.length&&!waypoints.length){toast(`「${filename}」無有效軌跡點`,'err');return;}
  const lg=L.layerGroup();
  allSegments.forEach(seg=>{const ll=seg.map(p=>[p.lat,p.lon]);L.polyline(ll,{color:'#000',weight:5,opacity:.2,lineJoin:'round',lineCap:'round'}).addTo(lg);L.polyline(ll,{color,weight:3,opacity:.95,lineJoin:'round',lineCap:'round'}).addTo(lg);});
  const mkIcon=(emoji,bg)=>L.divIcon({html:`<div style="width:26px;height:26px;border-radius:50%;background:${bg};border:2.5px solid #fff;display:flex;align-items:center;justify-content:center;font-size:12px;box-shadow:0 2px 8px rgba(0,0,0,.5)">${emoji}</div>`,className:'',iconSize:[26,26],iconAnchor:[13,13]});
  if(allPts.length){const s=allPts[0],e=allPts[allPts.length-1];L.marker([s.lat,s.lon],{icon:mkIcon('▶','#22c55e'),zIndexOffset:2000}).bindPopup(gpxPopup('▶ 起點',trackName,s)).addTo(lg);if(s.lat!==e.lat||s.lon!==e.lon)L.marker([e.lat,e.lon],{icon:mkIcon('■','#ef4444'),zIndexOffset:2000}).bindPopup(gpxPopup('■ 終點',trackName,e)).addTo(lg);}
  waypoints.forEach(wpt=>{const icon=L.divIcon({html:`<div style="width:20px;height:20px;border-radius:50%;background:#ffd166;border:2px solid #fff;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#000;box-shadow:0 1px 5px rgba(0,0,0,.4)">W</div>`,className:'',iconSize:[20,20],iconAnchor:[10,10]});L.marker([wpt.lat,wpt.lon],{icon,zIndexOffset:1900}).bindPopup(`<div class="gpx-pop-title">📍 ${wpt.name||'航點'}</div><div class="gpx-pop-row"><span class="gpx-pop-key">座標</span><span class="gpx-pop-val">${wpt.lat.toFixed(5)}, ${wpt.lon.toFixed(5)}</span></div>${wpt.ele?`<div class="gpx-pop-row"><span class="gpx-pop-key">海拔</span><span class="gpx-pop-val">${wpt.ele.toFixed(0)} m</span></div>`:''}`).addTo(lg);});
  lg.addTo(map);
  const stats=computeStats(allPts);
  const allLL=[...allPts.map(p=>[p.lat,p.lon]),...waypoints.map(p=>[p.lat,p.lon])];
  const bounds=allLL.length?L.latLngBounds(allLL):null;
  const id='gpx-'+Date.now()+'-'+Math.random().toString(36).slice(2,6);
  gpxTracks.push({id,name:trackName,color,layerGroup:lg,stats,bounds});
  renderGpxList(); updatePeek();
  if(bounds)map.fitBounds(bounds,{padding:[30,30]});
  toast(`✓ 已載入 GPX：${trackName}（${stats.distKm} km）`,'ok');
  switchTab('gpx'); openSheet();
}

function gpxPopup(label,track,pt){return`<div class="gpx-pop-title">${label}</div><div class="gpx-pop-row"><span class="gpx-pop-key">軌跡</span><span class="gpx-pop-val">${track}</span></div>${pt.ele?`<div class="gpx-pop-row"><span class="gpx-pop-key">海拔</span><span class="gpx-pop-val">${pt.ele.toFixed(0)} m</span></div>`:''}${pt.time?`<div class="gpx-pop-row"><span class="gpx-pop-key">時間</span><span class="gpx-pop-val">${fmtTime(pt.time)}</span></div>`:''}`;
}
function computeStats(pts){if(pts.length<2)return{distKm:'0.00',elevGain:0,elevLoss:0,ptCount:pts.length};let dist=0,gain=0,loss=0;for(let i=1;i<pts.length;i++){dist+=haversine(pts[i-1].lat,pts[i-1].lon,pts[i].lat,pts[i].lon);const de=(pts[i].ele||0)-(pts[i-1].ele||0);if(de>0)gain+=de;else loss+=Math.abs(de);}return{distKm:(dist/1000).toFixed(2),elevGain:Math.round(gain),elevLoss:Math.round(loss),ptCount:pts.length};}
function haversine(lat1,lon1,lat2,lon2){const R=6371000,dLat=(lat2-lat1)*Math.PI/180,dLon=(lon2-lon1)*Math.PI/180;const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));}
function fmtTime(iso){try{return new Date(iso).toLocaleString('zh-TW',{dateStyle:'short',timeStyle:'short'});}catch{return iso;}}

function renderGpxList(){
  const list=document.getElementById('gpxList');
  document.getElementById('gpxCount').textContent=gpxTracks.length;
  if(!gpxTracks.length){list.innerHTML='<div class="empty-hint">尚無 GPX 軌跡</div>';return;}
  list.innerHTML='';
  gpxTracks.forEach(t=>{
    const card=document.createElement('div');card.className='gpx-card';
    card.innerHTML=`
      <div class="gpx-card-hd">
        <div class="gpx-dot" style="background:${t.color}"></div>
        <div class="gpx-card-name">${t.name}</div>
      </div>
      <div class="gpx-stats">
        <div class="gpx-stat">📏 <strong>${t.stats.distKm} km</strong></div>
        ${t.stats.elevGain?`<div class="gpx-stat">↑ <strong>${t.stats.elevGain} m</strong></div>`:''}
        ${t.stats.elevLoss?`<div class="gpx-stat">↓ <strong>${t.stats.elevLoss} m</strong></div>`:''}
        <div class="gpx-stat">📍 <strong>${t.stats.ptCount}</strong> 點</div>
      </div>
      <div class="gpx-actions">
        <button class="gpx-act gpx-fit" onclick="fitGpx('${t.id}')">🔍 縮放至範圍</button>
        <button class="gpx-act gpx-del" onclick="removeGpx('${t.id}')">✕ 移除</button>
      </div>`;
    list.appendChild(card);
  });
}
function fitGpx(id){const t=gpxTracks.find(t=>t.id===id);if(t?.bounds){map.fitBounds(t.bounds,{padding:[30,30]});closeSheet();}}
function removeGpx(id){const i=gpxTracks.findIndex(t=>t.id===id);if(i===-1)return;map.removeLayer(gpxTracks[i].layerGroup);gpxTracks.splice(i,1);renderGpxList();updatePeek();toast('GPX 軌跡已移除');}

// ── Enter keys ────────────────────────────────
document.getElementById('wmtsUrl').addEventListener('keydown',e=>{if(e.key==='Enter')loadWMTS();});
document.getElementById('xyzUrl').addEventListener('keydown',e=>{if(e.key==='Enter')addXYZLayer();});
document.getElementById('xyzName').addEventListener('keydown',e=>{if(e.key==='Enter')addXYZLayer();});

// ── Init ──────────────────────────────────────
renderTileList();
renderGpxList();
</script>
