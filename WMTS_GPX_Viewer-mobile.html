<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>WMTS 圖資瀏覽器</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

:root {
  --bg:      #0f1117;
  --surface: #1a1d27;
  --surface2:#22263a;
  --border:  #2e3350;
  --accent:  #4f8ef7;
  --accent2: #7c3aed;
  --text:    #e8ecf4;
  --muted:   #8890a8;
  --success: #22c55e;
  --warn:    #f59e0b;
  --danger:  #ef4444;
  --gpx:     #ff6b35;
  --font:    'Segoe UI','Microsoft JhengHei',sans-serif;
  --safe-t:  env(safe-area-inset-top, 0px);
  --safe-b:  env(safe-area-inset-bottom, 0px);
  --peek:    68px;
}

html, body { width:100%; height:100%; font-family:var(--font); background:var(--bg); color:var(--text); overflow:hidden; position:fixed; }

/* ── Map ── */
#map { position:absolute; inset:0; z-index:1; }

/* ── Top bar ── */
.topbar {
  position:absolute; top:0; left:0; right:0; z-index:500;
  background:rgba(26,29,39,0.93); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
  padding:10px 12px; padding-top:calc(10px + var(--safe-t));
  display:flex; align-items:center; gap:8px;
}
.logo-icon { width:32px; height:32px; flex-shrink:0; background:linear-gradient(135deg,var(--accent),var(--accent2)); border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:16px; }
.url-input { flex:1; height:38px; min-width:0; background:var(--surface2); border:1px solid var(--border); border-radius:8px; color:var(--text); font-size:13px; padding:0 10px; outline:none; font-family:monospace; }
.url-input:focus { border-color:var(--accent); }
.url-input::placeholder { color:var(--muted); font-size:12px; }
.topbar-btns { display:flex; gap:6px; flex-shrink:0; }
.tbtn { height:38px; border-radius:8px; border:none; cursor:pointer; font-family:var(--font); font-size:13px; font-weight:700; padding:0 13px; white-space:nowrap; display:flex; align-items:center; gap:4px; transition:opacity 0.15s,transform 0.1s; }
.tbtn:active { transform:scale(0.96); opacity:0.8; }
.tbtn-blue   { background:var(--accent); color:#fff; }
.tbtn-orange { background:var(--gpx);    color:#fff; }

/* ── Status pill ── */
.status-pill { position:absolute; z-index:490; left:50%; transform:translateX(-50%); top:calc(62px + var(--safe-t)); background:rgba(26,29,39,0.9); backdrop-filter:blur(8px); border:1px solid var(--border); border-radius:20px; padding:5px 14px; display:flex; align-items:center; gap:7px; font-size:12px; color:var(--muted); white-space:nowrap; pointer-events:none; }
.status-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
.dot-idle    { background:var(--muted); }
.dot-loading { background:var(--warn); animation:pulse 1s infinite; }
.dot-ok      { background:var(--success); }
.dot-err     { background:var(--danger); }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.35} }

/* ── Sheet backdrop ── */
.sheet-backdrop { position:absolute; inset:0; z-index:599; background:rgba(0,0,0,0.48); opacity:0; pointer-events:none; transition:opacity 0.3s; }
.sheet-backdrop.visible { opacity:1; pointer-events:auto; }

/* ── Bottom sheet ── */
.bottom-sheet { position:absolute; left:0; right:0; bottom:0; z-index:600; background:var(--surface); border-radius:18px 18px 0 0; border-top:1px solid var(--border); display:flex; flex-direction:column; transform:translateY(calc(100% - var(--peek) - var(--safe-b))); transition:transform 0.35s cubic-bezier(0.32,0.72,0,1); will-change:transform; touch-action:none; max-height:88vh; }
.bottom-sheet.open { transform:translateY(0); }

.sheet-handle-wrap { padding:10px 0 0; display:flex; flex-direction:column; align-items:center; gap:8px; cursor:grab; flex-shrink:0; }
.sheet-handle { width:40px; height:5px; background:var(--border); border-radius:3px; }

/* Peek bar */
.peek-bar { display:flex; align-items:center; padding:0 14px 10px; gap:10px; flex-shrink:0; }
.peek-summary { flex:1; font-size:13px; color:var(--muted); }
.peek-summary strong { color:var(--text); }
.btn-toggle { height:34px; padding:0 14px; border-radius:8px; background:var(--surface2); border:1px solid var(--border); color:var(--text); font-size:13px; font-family:var(--font); cursor:pointer; font-weight:600; }
.btn-toggle:active { background:var(--border); }

/* Tabs */
.sheet-tabs { display:flex; padding:0 12px; gap:5px; flex-shrink:0; }
.tab-btn { flex:1; height:36px; border-radius:8px; border:1px solid var(--border); background:var(--surface2); color:var(--muted); font-size:11.5px; font-family:var(--font); cursor:pointer; transition:all 0.15s; display:flex; align-items:center; justify-content:center; gap:3px; font-weight:500; }
.tab-btn.active       { background:var(--accent); border-color:var(--accent); color:#fff; font-weight:700; }
.tab-btn.active.t-gpx { background:var(--gpx);    border-color:var(--gpx); }
.tab-btn:active { transform:scale(0.97); }

/* Panel */
.sheet-content { flex:1; overflow:hidden; display:flex; flex-direction:column; margin-top:8px; }
.tab-panel { display:none; flex:1; flex-direction:column; overflow:hidden; }
.tab-panel.active { display:flex; }
.scroll-list { flex:1; overflow-y:auto; padding:10px 14px; padding-bottom:calc(10px + var(--safe-b)); -webkit-overflow-scrolling:touch; }
.scroll-list::-webkit-scrollbar { display:none; }

/* ── Overlay slots ── */
.overlay-slot { background:var(--surface2); border:1px solid var(--border); border-radius:10px; padding:12px 14px; margin-bottom:8px; }
.overlay-slot.has-layer { border-color:var(--accent); }
.slot-header { display:flex; align-items:center; gap:10px; }
.slot-num { width:24px; height:24px; border-radius:6px; background:var(--border); color:var(--muted); font-size:12px; font-weight:700; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.overlay-slot.has-layer .slot-num { color:#fff; }
.slot-title { flex:1; font-size:13px; font-weight:600; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.overlay-slot.has-layer .slot-title { color:var(--text); }
.btn-remove { width:30px; height:30px; border-radius:8px; flex-shrink:0; background:rgba(239,68,68,0.1); border:1px solid rgba(239,68,68,0.3); color:var(--danger); font-size:14px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
.btn-remove:active { background:rgba(239,68,68,0.3); }
.opacity-section { margin-top:10px; }
.opacity-label { display:flex; justify-content:space-between; font-size:11px; color:var(--muted); margin-bottom:4px; }
.opacity-label span:last-child { color:var(--text); font-weight:700; }
input[type=range] { width:100%; height:4px; border-radius:2px; outline:none; border:none; background:var(--border); -webkit-appearance:none; appearance:none; cursor:pointer; }
input[type=range]::-webkit-slider-thumb { -webkit-appearance:none; width:20px; height:20px; border-radius:50%; background:var(--accent); border:2px solid #fff; box-shadow:0 1px 4px rgba(0,0,0,0.4); }
input[type=range]::-moz-range-thumb { width:20px; height:20px; border-radius:50%; background:var(--accent); border:2px solid #fff; }
.empty-slot-label { font-size:12px; color:var(--muted); font-style:italic; }

/* ── GPX ── */
.gpx-dropzone { border:2px dashed rgba(255,107,53,0.3); border-radius:10px; padding:18px 10px; text-align:center; cursor:pointer; font-size:13px; color:var(--muted); display:flex; flex-direction:column; align-items:center; gap:6px; margin-bottom:10px; transition:border-color 0.2s,background 0.2s; }
.gpx-dropzone:active,.gpx-dropzone.drag-over { border-color:var(--gpx); background:rgba(255,107,53,0.07); color:var(--gpx); }
.gpx-dz-icon { font-size:26px; }
.gpx-track-card { background:var(--surface2); border:1px solid rgba(255,107,53,0.25); border-radius:10px; padding:12px 14px; margin-bottom:8px; }
.gpx-track-header { display:flex; align-items:center; gap:8px; margin-bottom:6px; }
.gpx-color-dot { width:12px; height:12px; border-radius:50%; flex-shrink:0; }
.gpx-track-name { font-size:13px; font-weight:600; flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; color:var(--text); }
.gpx-track-stats { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:8px; }
.gpx-stat { font-size:11px; color:var(--muted); background:var(--bg); border-radius:5px; padding:3px 7px; display:flex; align-items:center; gap:3px; }
.gpx-stat strong { color:var(--text); }
.gpx-track-actions { display:flex; gap:6px; }
.btn-gpx-fit { flex:1; height:34px; border-radius:8px; border:1px solid rgba(255,107,53,0.4); background:rgba(255,107,53,0.1); color:var(--gpx); font-size:13px; cursor:pointer; font-family:var(--font); }
.btn-gpx-fit:active { background:rgba(255,107,53,0.25); }
.btn-gpx-del { height:34px; padding:0 14px; border-radius:8px; border:1px solid rgba(239,68,68,0.35); background:transparent; color:var(--danger); font-size:13px; cursor:pointer; font-family:var(--font); }
.btn-gpx-del:active { background:rgba(239,68,68,0.15); }

/* ── Available layers ── */
.layer-card { background:var(--surface2); border:1px solid var(--border); border-radius:10px; padding:12px 14px; margin-bottom:8px; cursor:pointer; display:flex; align-items:center; gap:12px; user-select:none; }
.layer-card:active { background:rgba(79,142,247,0.1); }
.layer-card.loaded { border-color:var(--accent); background:rgba(79,142,247,0.06); }
.layer-card-text { flex:1; min-width:0; }
.layer-card-title { font-size:14px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.layer-card-meta  { font-size:11px; color:var(--muted); margin-top:2px; }
.add-icon { width:32px; height:32px; border-radius:8px; flex-shrink:0; background:var(--border); color:var(--muted); font-size:18px; display:flex; align-items:center; justify-content:center; }
.layer-card.loaded .add-icon { background:rgba(34,197,94,0.2); color:var(--success); font-size:14px; }

/* ── Presets ── */
.preset-card { background:var(--surface2); border:1px solid var(--border); border-radius:10px; padding:14px; margin-bottom:8px; cursor:pointer; display:flex; align-items:center; gap:12px; }
.preset-card:active { border-color:var(--accent); background:rgba(79,142,247,0.08); }
.preset-icon { font-size:22px; width:40px; height:40px; background:var(--border); border-radius:10px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.preset-name { font-size:14px; font-weight:600; }
.preset-sub  { font-size:11px; color:var(--muted); margin-top:2px; }
.sec-title { font-size:10px; font-weight:700; letter-spacing:0.8px; text-transform:uppercase; color:var(--muted); padding:4px 0 8px; }
.max-warn { background:rgba(245,158,11,0.1); border:1px solid rgba(245,158,11,0.3); border-radius:8px; padding:8px 12px; font-size:12px; color:var(--warn); margin-bottom:8px; display:none; }
.max-warn.show { display:block; }
.badge { display:inline-block; font-size:10px; padding:1px 5px; border-radius:4px; font-weight:600; }
.badge-blue  { background:rgba(79,142,247,0.2); color:#7ab3ff; }
.badge-amber { background:rgba(245,158,11,0.2); color:#fcd34d; }

/* ── Loading ── */
.loading-overlay { position:absolute; inset:0; background:rgba(15,17,23,0.75); z-index:700; display:none; flex-direction:column; align-items:center; justify-content:center; gap:14px; }
.loading-overlay.show { display:flex; }
.spinner { width:40px; height:40px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 0.8s linear infinite; }
@keyframes spin { to{transform:rotate(360deg);} }
.loading-text { font-size:14px; color:var(--muted); }

/* ── Leaflet ── */
.leaflet-control-zoom { margin-bottom:calc(var(--peek) + 20px + var(--safe-b)) !important; }
.leaflet-control-zoom a { width:38px !important; height:38px !important; line-height:38px !important; font-size:18px !important; background:rgba(26,29,39,0.92) !important; color:var(--text) !important; border-color:var(--border) !important; }
.leaflet-bar { border:1px solid var(--border) !important; box-shadow:0 2px 12px rgba(0,0,0,0.4) !important; }
.leaflet-control-attribution { background:rgba(15,17,23,0.75) !important; color:var(--muted) !important; font-size:10px !important; margin-bottom:calc(var(--peek) + var(--safe-b)) !important; }
.leaflet-control-attribution a { color:var(--accent) !important; }
.leaflet-popup-content-wrapper { background:var(--surface) !important; border:1px solid var(--border) !important; border-radius:10px !important; color:var(--text) !important; box-shadow:0 4px 20px rgba(0,0,0,0.5) !important; font-family:var(--font) !important; font-size:13px !important; }
.leaflet-popup-tip { background:var(--surface) !important; }
.leaflet-popup-close-button { color:var(--muted) !important; font-size:16px !important; }
.gpx-popup-title { font-weight:700; font-size:14px; margin-bottom:7px; color:var(--gpx); }
.gpx-popup-row { display:flex; justify-content:space-between; gap:12px; margin-bottom:4px; }
.gpx-popup-key { color:var(--muted); }
.gpx-popup-val { font-weight:600; }

#gpxFileInput { display:none; }
</style>
</head>
<body>

<input type="file" id="gpxFileInput" accept=".gpx" multiple onchange="handleGpxFiles(this.files)">

<!-- Map -->
<div id="map"></div>

<!-- Top bar -->
<div class="topbar">
  <div class="logo-icon">🗺</div>
  <input class="url-input" id="urlInput" type="url" inputmode="url"
    placeholder="WMTS 網址…" value="https://wmts.nlsc.gov.tw/wmts"/>
  <div class="topbar-btns">
    <button class="tbtn tbtn-blue"   onclick="loadWMTS()">載入</button>
    <button class="tbtn tbtn-orange" onclick="document.getElementById('gpxFileInput').click()">📍GPX</button>
  </div>
</div>

<!-- Status pill -->
<div class="status-pill">
  <div class="status-dot dot-idle" id="statusDot"></div>
  <span id="statusMsg">就緒 · OpenStreetMap</span>
</div>

<!-- Backdrop -->
<div class="sheet-backdrop" id="sheetBackdrop" onclick="closeSheet()"></div>

<!-- Bottom sheet -->
<div class="bottom-sheet" id="bottomSheet">
  <div class="sheet-handle-wrap" id="sheetHandleWrap">
    <div class="sheet-handle"></div>
  </div>

  <!-- Peek bar -->
  <div class="peek-bar">
    <div class="peek-summary" id="peekSummary"><strong>0</strong> 個圖層 · <strong>0</strong> 條 GPX</div>
    <button class="btn-toggle" id="sheetToggleBtn" onclick="toggleSheet()">管理 ▲</button>
  </div>

  <!-- Tabs (4 tabs) -->
  <div class="sheet-tabs">
    <button class="tab-btn active"  id="tab-layers"    onclick="switchTab('layers')">⬡ 圖層</button>
    <button class="tab-btn t-gpx"   id="tab-gpx"       onclick="switchTab('gpx')">📍 GPX</button>
    <button class="tab-btn"         id="tab-available" onclick="switchTab('available')">📋 可用</button>
    <button class="tab-btn"         id="tab-presets"   onclick="switchTab('presets')">⚡ 常用</button>
  </div>

  <div class="sheet-content">

    <!-- Tab: active overlays -->
    <div class="tab-panel active" id="panel-layers">
      <div class="scroll-list" id="activeLayers"></div>
    </div>

    <!-- Tab: GPX tracks -->
    <div class="tab-panel" id="panel-gpx">
      <div class="scroll-list">
        <div class="gpx-dropzone" id="gpxDropzone"
          onclick="document.getElementById('gpxFileInput').click()"
          ondragover="handleDragOver(event)"
          ondragleave="handleDragLeave()"
          ondrop="handleDrop(event)">
          <div class="gpx-dz-icon">📂</div>
          <div style="font-weight:600">點擊選取 GPX 檔</div>
          <div style="font-size:11px;opacity:0.6">支援同時載入多個檔案</div>
        </div>
        <div id="gpxTrackList"></div>
      </div>
    </div>

    <!-- Tab: available layers -->
    <div class="tab-panel" id="panel-available">
      <div class="scroll-list">
        <div id="maxWarn" class="max-warn">⚠️ 已達上限（5 個圖層），請先移除</div>
        <div id="layerList">
          <div style="text-align:center;padding:32px 0;color:var(--muted);font-size:13px">
            📡 請輸入 WMTS 網址並點擊「載入」
          </div>
        </div>
      </div>
    </div>

    <!-- Tab: presets -->
    <div class="tab-panel" id="panel-presets">
      <div class="scroll-list">
        <div class="sec-title">台灣圖資</div>
        <div class="preset-card" onclick="loadPreset('nlsc')">
          <div class="preset-icon">🏛</div>
          <div><div class="preset-name">國土測繪中心 WMTS</div><div class="preset-sub">wmts.nlsc.gov.tw — 多種圖層</div></div>
        </div>
        <div class="preset-card" onclick="loadPreset('nlsc_ortho')">
          <div class="preset-icon">🛰</div>
          <div><div class="preset-name">國土測繪・正射影像</div><div class="preset-sub">直接疊加航空正射影像</div></div>
        </div>
        <div class="preset-card" onclick="loadPreset('nlsc_topo')">
          <div class="preset-icon">⛰</div>
          <div><div class="preset-name">國土測繪・通用電子地圖</div><div class="preset-sub">直接疊加通用版電子地圖</div></div>
        </div>
        <div class="sec-title" style="margin-top:4px;">全球底圖</div>
        <div class="preset-card" onclick="loadPreset('esri_sat')">
          <div class="preset-icon">🌍</div>
          <div><div class="preset-name">ESRI 衛星影像</div><div class="preset-sub">全球高解析衛星影像</div></div>
        </div>
        <div class="preset-card" onclick="loadPreset('esri_topo')">
          <div class="preset-icon">🗺</div>
          <div><div class="preset-name">ESRI 地形圖</div><div class="preset-sub">世界地形圖</div></div>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- Loading overlay -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <div class="loading-text" id="loadingText">連線中…</div>
</div>

<script>
// ────────────────────────────────────────────
const MAX_OVERLAYS = 5;
const SLOT_COLORS  = ['#4f8ef7','#22c55e','#f59e0b','#ef4444','#c084fc'];
const GPX_COLORS   = ['#ff6b35','#ffd166','#06d6a0','#118ab2','#e040fb','#f72585','#4cc9f0'];

// ── Map ──────────────────────────────────────
const map = L.map('map', { center:[23.97,120.97], zoom:8 });
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution:'&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
  maxZoom:19
}).addTo(map);

// ── State ────────────────────────────────────
let overlays      = [];
let gpxTracks     = [];
let gpxColorIndex = 0;
let sheetOpen     = false;

// ── Status ───────────────────────────────────
function setStatus(type, msg) {
  document.getElementById('statusDot').className = 'status-dot dot-' + type;
  document.getElementById('statusMsg').textContent = msg;
}
function showLoading(show, msg) {
  document.getElementById('loadingOverlay').classList.toggle('show', show);
  if (msg) document.getElementById('loadingText').textContent = msg;
}
function updatePeek() {
  document.getElementById('peekSummary').innerHTML =
    `<strong>${overlays.length}</strong> 個圖層 · <strong>${gpxTracks.length}</strong> 條 GPX`;
}

// ── Sheet ────────────────────────────────────
function openSheet() {
  sheetOpen = true;
  document.getElementById('bottomSheet').classList.add('open');
  document.getElementById('sheetBackdrop').classList.add('visible');
  document.getElementById('sheetToggleBtn').textContent = '管理 ▼';
}
function closeSheet() {
  sheetOpen = false;
  document.getElementById('bottomSheet').classList.remove('open');
  document.getElementById('sheetBackdrop').classList.remove('visible');
  document.getElementById('sheetToggleBtn').textContent = '管理 ▲';
}
function toggleSheet() { sheetOpen ? closeSheet() : openSheet(); }

// Drag-to-dismiss gesture
(function() {
  const sheet  = document.getElementById('bottomSheet');
  const handle = document.getElementById('sheetHandleWrap');
  let startY = 0, lastDY = 0, dragging = false;

  function curTranslate() {
    return new DOMMatrixReadOnly(getComputedStyle(sheet).transform).m42;
  }

  handle.addEventListener('touchstart', e => {
    dragging = true; startY = e.touches[0].clientY; lastDY = 0;
    sheet.style.transition = 'none';
  }, { passive:true });

  document.addEventListener('touchmove', e => {
    if (!dragging) return;
    lastDY = e.touches[0].clientY - startY;
    startY = e.touches[0].clientY;
    const next = Math.max(0, curTranslate() + lastDY);
    sheet.style.transform = `translateY(${next}px)`;
  }, { passive:true });

  document.addEventListener('touchend', () => {
    if (!dragging) return;
    dragging = false; sheet.style.transition = '';
    curTranslate() > sheet.offsetHeight * 0.28 ? closeSheet() : openSheet();
  });
})();

// ── Tabs ─────────────────────────────────────
function switchTab(name) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  document.getElementById('panel-' + name).classList.add('active');
}

// ════════════════════════════════════════════
//  GPX
// ════════════════════════════════════════════

function handleDragOver(e) { e.preventDefault(); document.getElementById('gpxDropzone').classList.add('drag-over'); }
function handleDragLeave() { document.getElementById('gpxDropzone').classList.remove('drag-over'); }
function handleDrop(e) {
  e.preventDefault(); document.getElementById('gpxDropzone').classList.remove('drag-over');
  const files = [...e.dataTransfer.files].filter(f => f.name.toLowerCase().endsWith('.gpx'));
  if (!files.length) { setStatus('err','請放入 .gpx 檔案'); return; }
  handleGpxFiles(files);
}
function handleGpxFiles(files) {
  [...files].forEach(f => { const r = new FileReader(); r.onload = e => parseAndAddGpx(f.name, e.target.result); r.readAsText(f); });
}

function parseAndAddGpx(filename, xmlText) {
  const xml   = new DOMParser().parseFromString(xmlText, 'text/xml');
  const color = GPX_COLORS[gpxColorIndex % GPX_COLORS.length];
  gpxColorIndex++;
  const trackName = xml.querySelector('name')?.textContent?.trim() || filename.replace(/\.gpx$/i,'');

  const allSegments = [];
  xml.querySelectorAll('trk trkseg').forEach(seg => {
    const pts = [...seg.querySelectorAll('trkpt')].map(pt => ({
      lat:parseFloat(pt.getAttribute('lat')), lon:parseFloat(pt.getAttribute('lon')),
      ele:parseFloat(pt.querySelector('ele')?.textContent??0), time:pt.querySelector('time')?.textContent??null
    })).filter(p=>!isNaN(p.lat)&&!isNaN(p.lon));
    if (pts.length) allSegments.push(pts);
  });
  xml.querySelectorAll('rte').forEach(rte => {
    const pts = [...rte.querySelectorAll('rtept')].map(pt => ({
      lat:parseFloat(pt.getAttribute('lat')), lon:parseFloat(pt.getAttribute('lon')),
      ele:parseFloat(pt.querySelector('ele')?.textContent??0), time:null
    })).filter(p=>!isNaN(p.lat)&&!isNaN(p.lon));
    if (pts.length) allSegments.push(pts);
  });
  const waypoints = [...xml.querySelectorAll('wpt')].map(wpt => ({
    lat:parseFloat(wpt.getAttribute('lat')), lon:parseFloat(wpt.getAttribute('lon')),
    name:wpt.querySelector('name')?.textContent?.trim()??'', ele:parseFloat(wpt.querySelector('ele')?.textContent??0)
  })).filter(p=>!isNaN(p.lat)&&!isNaN(p.lon));

  const allPts = allSegments.flat();
  if (!allPts.length && !waypoints.length) { setStatus('err',`「${filename}」找不到有效軌跡點`); return; }

  const layerGroup = L.layerGroup();

  allSegments.forEach(seg => {
    const ll = seg.map(p=>[p.lat,p.lon]);
    L.polyline(ll, {color:'#000',weight:5,opacity:0.2,lineJoin:'round',lineCap:'round'}).addTo(layerGroup);
    L.polyline(ll, {color,weight:3.5,opacity:0.95,lineJoin:'round',lineCap:'round'}).addTo(layerGroup);
  });

  const mkIcon = (emoji,bg) => L.divIcon({
    html:`<div style="width:28px;height:28px;border-radius:50%;background:${bg};border:2.5px solid #fff;display:flex;align-items:center;justify-content:center;font-size:13px;box-shadow:0 2px 8px rgba(0,0,0,0.5)">${emoji}</div>`,
    className:'',iconSize:[28,28],iconAnchor:[14,14]
  });

  if (allPts.length) {
    const s=allPts[0], e=allPts[allPts.length-1];
    L.marker([s.lat,s.lon],{icon:mkIcon('▶','#22c55e'),zIndexOffset:2000}).bindPopup(gpxPopup('▶ 起點',trackName,s)).addTo(layerGroup);
    if (s.lat!==e.lat||s.lon!==e.lon)
      L.marker([e.lat,e.lon],{icon:mkIcon('■','#ef4444'),zIndexOffset:2000}).bindPopup(gpxPopup('■ 終點',trackName,e)).addTo(layerGroup);
  }

  waypoints.forEach(wpt => {
    const icon = L.divIcon({html:`<div style="width:22px;height:22px;border-radius:50%;background:#ffd166;border:2px solid #fff;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#000;box-shadow:0 1px 5px rgba(0,0,0,0.4)">W</div>`,className:'',iconSize:[22,22],iconAnchor:[11,11]});
    L.marker([wpt.lat,wpt.lon],{icon,zIndexOffset:1900}).bindPopup(`<div class="gpx-popup-title">📍 ${wpt.name||'航點'}</div><div class="gpx-popup-row"><span class="gpx-popup-key">座標</span><span class="gpx-popup-val">${wpt.lat.toFixed(5)}, ${wpt.lon.toFixed(5)}</span></div>${wpt.ele?`<div class="gpx-popup-row"><span class="gpx-popup-key">海拔</span><span class="gpx-popup-val">${wpt.ele.toFixed(0)} m</span></div>`:''}`).addTo(layerGroup);
  });

  layerGroup.addTo(map);

  const stats  = computeStats(allPts);
  const allLL  = [...allPts.map(p=>[p.lat,p.lon]),...waypoints.map(p=>[p.lat,p.lon])];
  const bounds = allLL.length ? L.latLngBounds(allLL) : null;
  const id = 'gpx-'+Date.now()+'-'+Math.random().toString(36).slice(2,6);

  gpxTracks.push({id,name:trackName,color,layerGroup,stats,bounds});
  renderGpxList(); updatePeek();
  if (bounds) map.fitBounds(bounds,{padding:[30,30]});
  setStatus('ok',`已載入 GPX：${trackName}（${stats.distKm} km）`);
  switchTab('gpx'); openSheet();
}

function gpxPopup(label, track, pt) {
  return `<div class="gpx-popup-title">${label}</div>
    <div class="gpx-popup-row"><span class="gpx-popup-key">軌跡</span><span class="gpx-popup-val">${track}</span></div>
    ${pt.ele?`<div class="gpx-popup-row"><span class="gpx-popup-key">海拔</span><span class="gpx-popup-val">${pt.ele.toFixed(0)} m</span></div>`:''}
    ${pt.time?`<div class="gpx-popup-row"><span class="gpx-popup-key">時間</span><span class="gpx-popup-val">${fmtTime(pt.time)}</span></div>`:''}`;
}
function computeStats(pts) {
  if (pts.length<2) return{distKm:'0.00',elevGain:0,elevLoss:0,ptCount:pts.length};
  let dist=0,gain=0,loss=0;
  for(let i=1;i<pts.length;i++){dist+=haversine(pts[i-1].lat,pts[i-1].lon,pts[i].lat,pts[i].lon);const de=(pts[i].ele||0)-(pts[i-1].ele||0);if(de>0)gain+=de;else loss+=Math.abs(de);}
  return{distKm:(dist/1000).toFixed(2),elevGain:Math.round(gain),elevLoss:Math.round(loss),ptCount:pts.length};
}
function haversine(lat1,lon1,lat2,lon2){
  const R=6371000,dLat=(lat2-lat1)*Math.PI/180,dLon=(lon2-lon1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function fmtTime(iso){try{return new Date(iso).toLocaleString('zh-TW',{dateStyle:'short',timeStyle:'short'});}catch{return iso;}}

function renderGpxList() {
  const list = document.getElementById('gpxTrackList');
  list.innerHTML = '';
  gpxTracks.forEach(t => {
    const card = document.createElement('div');
    card.className = 'gpx-track-card';
    card.innerHTML = `
      <div class="gpx-track-header">
        <div class="gpx-color-dot" style="background:${t.color}"></div>
        <div class="gpx-track-name" title="${t.name}">${t.name}</div>
      </div>
      <div class="gpx-track-stats">
        <div class="gpx-stat">📏 <strong>${t.stats.distKm} km</strong></div>
        ${t.stats.elevGain?`<div class="gpx-stat">↑ <strong>${t.stats.elevGain} m</strong></div>`:''}
        ${t.stats.elevLoss?`<div class="gpx-stat">↓ <strong>${t.stats.elevLoss} m</strong></div>`:''}
        <div class="gpx-stat">📍 <strong>${t.stats.ptCount}</strong> 點</div>
      </div>
      <div class="gpx-track-actions">
        <button class="btn-gpx-fit" onclick="fitGpx('${t.id}')">🔍 縮放至範圍</button>
        <button class="btn-gpx-del" onclick="removeGpx('${t.id}')">✕ 移除</button>
      </div>`;
    list.appendChild(card);
  });
}
function fitGpx(id){ const t=gpxTracks.find(t=>t.id===id); if(t?.bounds){map.fitBounds(t.bounds,{padding:[30,30]});closeSheet();} }
function removeGpx(id){ const i=gpxTracks.findIndex(t=>t.id===id); if(i===-1)return; map.removeLayer(gpxTracks[i].layerGroup); gpxTracks.splice(i,1); renderGpxList(); updatePeek(); setStatus('ok','已移除 GPX 軌跡'); }

// ════════════════════════════════════════════

function renderActiveSlots() {
  const c = document.getElementById('activeLayers');
  c.innerHTML = '';
  for (let i=0;i<MAX_OVERLAYS;i++) {
    const ov=overlays[i], slot=document.createElement('div');
    slot.className='overlay-slot'+(ov?' has-layer':'');
    if (ov) {
      const pct=Math.round(ov.layer.options.opacity*100);
      slot.innerHTML=`<div class="slot-header"><div class="slot-num" style="background:${SLOT_COLORS[i]}">${i+1}</div><div class="slot-title">${ov.title}</div><div class="btn-remove" onclick="removeOverlay(${i})">✕</div></div><div class="opacity-section"><div class="opacity-label"><span>透明度</span><span id="opct-${i}">${pct}%</span></div><input type="range" min="0" max="100" value="${pct}" style="accent-color:${SLOT_COLORS[i]}" oninput="updateSlotOpacity(${i},this.value)"/></div>`;
    } else {
      slot.innerHTML=`<div class="slot-header"><div class="slot-num">${i+1}</div><div class="slot-title empty-slot-label">（空槽位）</div></div>`;
    }
    c.appendChild(slot);
  }
  document.getElementById('maxWarn').classList.toggle('show',overlays.length>=MAX_OVERLAYS);
  updatePeek();
}
function updateSlotOpacity(i,val){ if(overlays[i]){overlays[i].layer.setOpacity(val/100);document.getElementById('opct-'+i).textContent=val+'%';} }
function removeOverlay(i){ if(!overlays[i])return; map.removeLayer(overlays[i].layer); overlays.splice(i,1); renderActiveSlots(); setStatus('ok',`已移除，目前 ${overlays.length} 個`); }

function addXYZOverlay(id,title,url){
  if(overlays.some(o=>o.id===id)){setStatus('ok',`「${title}」已在地圖上`);return;}
  if(overlays.length>=MAX_OVERLAYS){setStatus('err',`已達上限（${MAX_OVERLAYS} 個）`);return;}
  const lyr=L.tileLayer(url,{opacity:0.9,maxZoom:20,attribution:title,errorTileUrl:''}).addTo(map);
  gpxTracks.forEach(t=>t.layerGroup.bringToFront());
  overlays.push({id,title,layer:lyr}); renderActiveSlots(); setStatus('ok',`已加入：${title}`);
  switchTab('layers'); openSheet();
}

function getText(el,tag){const n=el.querySelector(tag);return n?n.textContent.trim():'';}
function parseCapabilities(xmlText){
  const xml=new DOMParser().parseFromString(xmlText,'text/xml'),layers=[];
  xml.querySelectorAll('Layer').forEach(layer=>{
    const id=getText(layer,'Identifier')||getText(layer,'ows\\:Identifier');if(!id)return;
    const title=getText(layer,'Title')||getText(layer,'ows\\:Title')||id;
    const abstract=getText(layer,'Abstract')||getText(layer,'ows\\:Abstract')||'';
    const formats=[...layer.querySelectorAll('Format')].map(f=>f.textContent.trim());
    const tmsLinks=[...layer.querySelectorAll('TileMatrixSetLink')].map(t=>getText(t,'TileMatrixSet')||getText(t,'ows\\:TileMatrixSet'));
    const styles=[...layer.querySelectorAll('Style')].map(s=>getText(s,'Identifier')||getText(s,'ows\\:Identifier'));
    let bbox=null;const bboxEl=layer.querySelector('WGS84BoundingBox')||layer.querySelector('BoundingBox');
    if(bboxEl){const lc=getText(bboxEl,'LowerCorner'),uc=getText(bboxEl,'UpperCorner');if(lc&&uc){const[x0,y0]=lc.split(' ').map(Number),[x1,y1]=uc.split(' ').map(Number);bbox=[[y0,x0],[y1,x1]];}}
    layers.push({id,title,abstract,formats,tmsLinks,styles,bbox});
  });
  const resourceUrls={};
  xml.querySelectorAll('ResourceURL').forEach(r=>{const l=r.closest('Layer');if(!l)return;const id=getText(l,'Identifier')||getText(l,'ows\\:Identifier');if(!resourceUrls[id])resourceUrls[id]=r.getAttribute('template');});
  const opEl=xml.querySelector('OperationsMetadata Operation[name="GetTile"]')||xml.querySelector('Operation[name="GetTile"]');
  let kvpUrl='';if(opEl){const g=opEl.querySelector('Get');if(g)kvpUrl=g.getAttribute('xlink:href')||'';}
  return{layers,resourceUrls,kvpUrl};
}
function buildWMTSTileUrl(baseUrl,layerId,style,tms,format){
  const url=baseUrl.split('?')[0].replace(/\/+$/,'');
  if(url.includes('{TileMatrix}')||url.includes('{z}'))return url;
  return`${url}?SERVICE=WMTS&REQUEST=GetTile&VERSION=1.0.0&LAYER=${encodeURIComponent(layerId)}&STYLE=${encodeURIComponent(style||'default')}&TILEMATRIXSET=${encodeURIComponent(tms||'GoogleMapsCompatible')}&TILEMATRIX={z}&TILEROW={y}&TILECOL={x}&FORMAT=${encodeURIComponent(format||'image/png')}`;
}
async function fetchCapabilities(url){
  try{const r=await fetch(url,{mode:'cors',signal:AbortSignal.timeout(10000)});if(r.ok)return await r.text();}catch(_){}
  for(const p of[`https://corsproxy.io/?${encodeURIComponent(url)}`,`https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`]){try{const r=await fetch(p,{signal:AbortSignal.timeout(12000)});if(r.ok)return await r.text();}catch(_){}}
  throw new Error('無法取得 Capabilities，請確認網址或網路連線');
}
async function loadWMTS(){
  let url=document.getElementById('urlInput').value.trim();
  if(!url){alert('請輸入 WMTS 網址');return;}
  const capUrl=url.includes('?')?(url.toLowerCase().includes('getcapabilities')?url:url+'&SERVICE=WMTS&REQUEST=GetCapabilities&VERSION=1.0.0'):url+'?SERVICE=WMTS&REQUEST=GetCapabilities&VERSION=1.0.0';
  showLoading(true,'正在取得 GetCapabilities…');setStatus('loading','連線中…');document.activeElement.blur();
  try{
    const xmlText=await fetchCapabilities(capUrl);showLoading(true,'正在解析…');
    const{layers,resourceUrls,kvpUrl}=parseCapabilities(xmlText);
    if(!layers.length)throw new Error('未找到任何圖層');
    setStatus('ok',`載入 ${layers.length} 個圖層`);renderLayerList(layers,url,resourceUrls,kvpUrl);
    switchTab('available');openSheet();
  }catch(err){
    setStatus('err','失敗：'+err.message);
    document.getElementById('layerList').innerHTML=`<div style="color:var(--danger);font-size:13px;padding:16px 0">⚠️ ${err.message}</div>`;
    switchTab('available');openSheet();
  }finally{showLoading(false);}
}
function renderLayerList(layers,baseUrl,resourceUrls,kvpUrl){
  const list=document.getElementById('layerList');list.innerHTML='';
  layers.forEach(layer=>{
    const loaded=overlays.some(o=>o.id===layer.id);
    const card=document.createElement('div');card.className='layer-card'+(loaded?' loaded':'');
    card.innerHTML=`<div class="layer-card-text"><div class="layer-card-title">${layer.title}</div><div class="layer-card-meta"><span class="badge badge-blue">${(layer.formats[0]||'').split('/')[1]||'png'}</span> <span class="badge badge-amber">${layer.tmsLinks[0]||'GoogleMapsCompatible'}</span></div></div><div class="add-icon">${loaded?'✓':'+'}</div>`;
    card.onclick=()=>{
      if(loaded){setStatus('ok',`「${layer.title}」已在地圖上`);return;}
      if(overlays.length>=MAX_OVERLAYS){setStatus('err',`已達上限（${MAX_OVERLAYS} 個）`);return;}
      addOverlayLayer(layer,baseUrl,resourceUrls,kvpUrl);card.classList.add('loaded');card.querySelector('.add-icon').textContent='✓';
    };
    list.appendChild(card);
  });
}
function addOverlayLayer(layer,baseUrl,resourceUrls,kvpUrl){
  const style=layer.styles[0]||'default',tms=layer.tmsLinks[0]||'GoogleMapsCompatible';
  const fmt=layer.formats.find(f=>f.includes('png')||f.includes('jpeg'))||layer.formats[0]||'image/png';
  let tileUrl;
  if(resourceUrls[layer.id]){tileUrl=resourceUrls[layer.id].replace('{TileMatrix}','{z}').replace('{TileRow}','{y}').replace('{TileCol}','{x}').replace('{Style}',style).replace('{TileMatrixSet}',tms);}
  else{tileUrl=buildWMTSTileUrl(kvpUrl||baseUrl,layer.id,style,tms,fmt);}
  const lyr=L.tileLayer(tileUrl,{opacity:0.9,maxZoom:20,tms:false,attribution:layer.title,errorTileUrl:''}).addTo(map);
  gpxTracks.forEach(t=>t.layerGroup.bringToFront());
  overlays.push({id:layer.id,title:layer.title,layer:lyr});renderActiveSlots();
  setStatus('ok',`已加入：${layer.title}`);
  if(layer.bbox){try{map.fitBounds(layer.bbox);}catch(_){}}
  switchTab('layers');
}
function loadPreset(key){
  switch(key){
    case 'nlsc':document.getElementById('urlInput').value='https://wmts.nlsc.gov.tw/wmts';loadWMTS();break;
    case 'nlsc_ortho':addXYZOverlay('PHOTO2','國土測繪・正射影像','https://wmts.nlsc.gov.tw/wmts/PHOTO2/default/GoogleMapsCompatible/{z}/{y}/{x}');break;
    case 'nlsc_topo':addXYZOverlay('EMAP','國土測繪・通用版電子地圖','https://wmts.nlsc.gov.tw/wmts/EMAP/default/GoogleMapsCompatible/{z}/{y}/{x}');break;
    case 'esri_sat':addXYZOverlay('esri_sat','ESRI 衛星影像','https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}');break;
    case 'esri_topo':addXYZOverlay('esri_topo','ESRI 地形圖','https://server.arcgisonline.com/ArcGIS/rest/services/World_Topo_Map/MapServer/tile/{z}/{y}/{x}');break;
  }
}
document.getElementById('urlInput').addEventListener('keydown',e=>{if(e.key==='Enter')loadWMTS();});

// Init
renderActiveSlots();
renderGpxList();
</script>
