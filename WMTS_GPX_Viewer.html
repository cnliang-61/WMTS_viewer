<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>地圖瀏覽器 Pro</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #0d0f14;
  --panel:   #13161e;
  --panel2:  #181c26;
  --border:  #1f2533;
  --accent:  #3b82f6;
  --accent2: #06b6d4;
  --text:    #e2e8f0;
  --muted:   #64748b;
  --success: #22c55e;
  --warn:    #f59e0b;
  --danger:  #ef4444;
  --gpx:     #ff6b35;
  --font-ui: 'Noto Sans TC', sans-serif;
  --font-mono:'Space Mono', monospace;
}

body { background:var(--bg); color:var(--text); font-family:var(--font-ui); height:100vh; display:flex; flex-direction:column; overflow:hidden; }

/* ── Header ── */
header { display:flex; align-items:center; gap:12px; padding:0 16px; height:48px; background:var(--panel); border-bottom:1px solid var(--border); flex-shrink:0; z-index:100; }
.logo { font-family:var(--font-mono); font-size:17.3px; font-weight:700; color:var(--accent); letter-spacing:2px; white-space:nowrap; }
.hd-div { width:1px; height:18px; background:var(--border); }
.coords-display { font-family:var(--font-mono); font-size:14.7px; color:var(--muted); white-space:nowrap; margin-left:auto; }
.coords-display span { color:var(--accent2); }

/* ── Input bar ── */
.input-bar { display:flex; align-items:center; gap:0; background:var(--panel2); border-bottom:1px solid var(--border); flex-shrink:0; }

/* Mode toggle tabs */
.mode-tabs { display:flex; flex-shrink:0; border-right:1px solid var(--border); height:46px; }
.mode-tab { display:flex; align-items:center; gap:5px; padding:0 14px; font-size:15.3px; font-weight:500; color:var(--muted); cursor:pointer; border-right:1px solid var(--border); border-bottom:2px solid transparent; transition:all .15s; white-space:nowrap; user-select:none; }
.mode-tab:last-child { border-right:none; }
.mode-tab:hover { color:var(--text); background:rgba(255,255,255,.03); }
.mode-tab.active { color:var(--accent); border-bottom-color:var(--accent); background:rgba(59,130,246,.05); }
.mode-tab.active.gpx-tab { color:var(--gpx); border-bottom-color:var(--gpx); background:rgba(255,107,53,.05); }
#mt-mymaps.active { color:#4ade80; border-bottom-color:#34a853; background:rgba(52,168,83,.05); }

/* Input zones */
.input-zone { flex:1; display:none; align-items:center; gap:8px; padding:0 14px; }
.input-zone.active { display:flex; }

/* shared input styles */
.ipt { height:30px; background:var(--bg); border:1px solid var(--border); border-radius:5px; color:var(--text); outline:none; transition:border-color .2s; font-family:var(--font-mono); font-size:14.7px; padding:0 10px; }
.ipt:focus { border-color:var(--accent); }
.ipt::placeholder { color:var(--muted); font-size:13.3px; }
.ipt-wide  { flex:1; min-width:0; }
.ipt-name  { width:130px; flex-shrink:0; font-family:var(--font-ui); }
.ipt-label { font-family:var(--font-mono); font-size:14.7px; color:var(--muted); white-space:nowrap; flex-shrink:0; }

.bar-btn { height:30px; padding:0 14px; border-radius:5px; border:none; font-family:var(--font-ui); font-size:16px; font-weight:500; cursor:pointer; white-space:nowrap; flex-shrink:0; transition:opacity .15s; }
.bar-btn:hover { opacity:.85; }
.bar-btn-blue   { background:var(--accent); color:#fff; }
.bar-btn-orange { background:var(--gpx);    color:#fff; }

/* GPX zone specifics */
.gpx-zone-hint { font-size:14.7px; color:var(--muted); flex:1; }
.gpx-zone-hint em { color:var(--gpx); font-style:normal; }

/* ── URL history dropdown ── */
.url-hist-wrap {
  position:relative; flex:1; display:flex; align-items:center; min-width:0;
}
.url-hist-wrap .ipt { width:100%; }
.hist-btn {
  position:absolute; right:6px; top:50%; transform:translateY(-50%);
  width:22px; height:22px; border-radius:4px; border:none;
  background:transparent; color:var(--muted); cursor:pointer;
  font-size:14px; display:flex; align-items:center; justify-content:center;
  transition:color .15s, background .15s; flex-shrink:0;
  line-height:1;
}
.hist-btn:hover { color:var(--accent); background:rgba(59,130,246,.1); }
.hist-dropdown {
  display:none; position:absolute; top:calc(100% + 4px); left:0; right:0;
  background:var(--panel2); border:1px solid var(--border);
  border-radius:8px; z-index:2000; max-height:240px; overflow-y:auto;
  box-shadow:0 8px 24px rgba(0,0,0,.5);
  scrollbar-width:thin; scrollbar-color:var(--border) transparent;
}
.hist-dropdown.open { display:block; }
.hist-empty {
  padding:12px 14px; font-size:12px; color:var(--muted); text-align:center;
}
.hist-item {
  display:flex; align-items:center; gap:6px; padding:7px 10px;
  cursor:pointer; transition:background .12s; border-bottom:1px solid var(--border);
}
.hist-item:last-child { border-bottom:none; }
.hist-item:hover { background:rgba(59,130,246,.08); }
.hist-item-icon { font-size:12px; color:var(--muted); flex-shrink:0; }
.hist-item-url {
  flex:1; font-family:var(--font-mono); font-size:11px; color:var(--text);
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.hist-item-del {
  width:18px; height:18px; border-radius:4px; border:none; background:transparent;
  color:var(--muted); cursor:pointer; font-size:12px; flex-shrink:0;
  display:flex; align-items:center; justify-content:center; opacity:0;
  transition:all .12s;
}
.hist-item:hover .hist-item-del { opacity:1; }
.hist-item-del:hover { background:var(--danger); color:#fff; border-radius:3px; }
.hist-clear-row {
  padding:5px 10px; text-align:right; border-top:1px solid var(--border);
}
.hist-clear-btn {
  font-size:11px; color:var(--muted); background:none; border:none;
  cursor:pointer; font-family:var(--font-ui);
}
.hist-clear-btn:hover { color:var(--danger); }

/* ── Layout ── */
.main { flex:1; display:flex; overflow:hidden; }

/* ── Sidebar ── */
.sidebar { width:272px; min-width:160px; max-width:600px; background:var(--panel); border-right:1px solid var(--border); display:flex; flex-direction:column; flex-shrink:0; overflow:hidden; position:relative; }

/* ── Resizer handle ── */
.resizer {
  position:absolute; top:0; right:0; bottom:0;
  width:5px; cursor:col-resize; z-index:200;
  background:transparent; transition:background .15s;
}
.resizer:hover, .resizer.dragging { background:var(--accent); }
.resizer::after {
  content:''; position:absolute; top:50%; left:50%;
  transform:translate(-50%,-50%);
  width:1px; height:32px;
  background:var(--border); border-radius:1px;
  transition:background .15s;
}
.resizer:hover::after, .resizer.dragging::after { background:var(--accent); }

.sb-section { flex-shrink:0; border-bottom:1px solid var(--border); }
.sb-section-hd { display:flex; align-items:center; justify-content:space-between; padding:8px 12px; font-size:13.3px; font-weight:700; letter-spacing:1px; text-transform:uppercase; color:var(--muted); cursor:pointer; user-select:none; }
.sb-section-hd:hover { color:var(--text); }
.sb-section-body { overflow:hidden; }
.sb-section-body.collapsed { display:none; }
.caret { transition:transform .2s; display:inline-block; font-size:12px; }
.caret.open { transform:rotate(90deg); }
.sb-count { background:rgba(59,130,246,.2); color:var(--accent); border-radius:10px; padding:1px 6px; font-size:13.3px; }
.sb-count-gpx { background:rgba(255,107,53,.2); color:var(--gpx); border-radius:10px; padding:1px 6px; font-size:13.3px; }

/* Layer list scroll area */
.sb-scroll { overflow-y:auto; padding:6px; max-height:220px; scrollbar-width:thin; scrollbar-color:var(--border) transparent; }
.sb-scroll.tall { max-height:none; flex:1; }

/* ── Layer items (tile layers) ── */
.lyr-item { border-radius:7px; border:1px solid transparent; margin-bottom:3px; transition:background .15s, border-color .15s, box-shadow .15s; overflow:hidden; }
.lyr-item:hover { background:rgba(255,255,255,.03); }
.lyr-item.active { background:rgba(59,130,246,.08); border-color:rgba(59,130,246,.25); }
.lyr-item.drag-over-top    { border-top:2px solid var(--accent) !important; }
.lyr-item.drag-over-bottom { border-bottom:2px solid var(--accent) !important; }
.lyr-item.dragging-ghost { opacity:.35; pointer-events:none; }
.lyr-row { display:flex; align-items:center; gap:7px; padding:7px 9px; cursor:pointer; }

/* drag handle */
.drag-handle {
  display:flex; align-items:center; justify-content:center;
  width:16px; flex-shrink:0;
  color:var(--border); cursor:grab; font-size:14px; line-height:1;
  transition:color .15s; user-select:none;
}
.lyr-item:hover .drag-handle { color:var(--muted); }
.drag-handle:active { cursor:grabbing; }
.lyr-vis { width:12px; height:12px; border-radius:3px; border:2px solid; flex-shrink:0; cursor:pointer; transition:all .15s; }
.lyr-vis.on { background:currentColor; }
.lyr-info { flex:1; min-width:0; }
.lyr-name { font-size:16px; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.lyr-url-txt { font-family:var(--font-mono); font-size:12px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-top:1px; }
.lyr-badge { font-size:12px; padding:1px 5px; border-radius:3px; font-weight:600; margin-left:3px; vertical-align:middle; }
.lyr-badge-wmts { background:rgba(59,130,246,.2); color:#7ab3ff; }
.lyr-badge-xyz  { background:rgba(6,182,212,.2);  color:#22d3ee; }
.del-btn { width:20px; height:20px; border-radius:4px; border:1px solid transparent; background:transparent; color:var(--muted); cursor:pointer; font-size:16px; display:flex; align-items:center; justify-content:center; flex-shrink:0; opacity:0; transition:all .15s; }
.lyr-item:hover .del-btn { opacity:1; }
.del-btn:hover { background:var(--danger); border-color:var(--danger); color:#fff; }
.op-row { display:none; align-items:center; gap:7px; padding:0 9px 7px 28px; font-size:13.3px; color:var(--muted); }
.lyr-item.active .op-row { display:flex; }
.op-slider { flex:1; accent-color:var(--accent); cursor:pointer; }
.op-val { font-family:var(--font-mono); font-size:13.3px; color:var(--accent2); width:30px; text-align:right; }

/* ── WMTS layer picker ── */
.wmts-pick-list { padding:4px 6px 6px; }
/* when wmts-pick-list also has sb-scroll, let sb-scroll padding take over */
.wmts-pick-list.sb-scroll { padding:6px; }
.wmts-pick-item { display:flex; align-items:center; gap:7px; padding:6px 8px; border-radius:6px; border:1px solid var(--border); margin-bottom:3px; cursor:pointer; background:var(--panel2); transition:all .15s; font-size:14.7px; }
.wmts-pick-item:hover { border-color:var(--accent); background:rgba(59,130,246,.06); }
.wmts-pick-item.added { border-color:rgba(34,197,94,.4); background:rgba(34,197,94,.05); opacity:.7; cursor:default; }
.wmts-pick-name { flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.wmts-pick-add { font-size:18.7px; color:var(--accent); flex-shrink:0; font-weight:700; }
.wmts-pick-item.added .wmts-pick-add { color:var(--success); font-size:14.7px; }
.wmts-empty { padding:16px 10px; text-align:center; color:var(--muted); font-size:14.7px; line-height:1.7; }

/* ── GPX tracks ── */
.gpx-card { border-radius:7px; border:1px solid rgba(255,107,53,.25); margin-bottom:4px; padding:8px 10px; background:var(--panel2); }
.gpx-card-hd { display:flex; align-items:center; gap:7px; margin-bottom:5px; }
.gpx-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
.gpx-card-name { font-size:16px; font-weight:600; flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; color:var(--text); }
.gpx-card-del { width:20px; height:20px; border-radius:4px; border:1px solid transparent; background:transparent; color:var(--muted); cursor:pointer; font-size:16px; display:flex; align-items:center; justify-content:center; opacity:0; transition:all .15s; }
.gpx-card:hover .gpx-card-del { opacity:1; }
.gpx-card-del:hover { background:var(--danger); border-color:var(--danger); color:#fff; }
.gpx-stats { display:flex; gap:5px; flex-wrap:wrap; margin-bottom:6px; }
.gpx-stat { font-size:12px; color:var(--muted); background:var(--bg); border-radius:4px; padding:2px 6px; }
.gpx-stat strong { color:var(--text); }
.gpx-card-actions { display:flex; gap:4px; }
.gpx-act-btn { flex:1; height:22px; border-radius:4px; font-size:13.3px; cursor:pointer; border:1px solid; font-family:var(--font-ui); }
.btn-fit  { border-color:rgba(255,107,53,.4); background:rgba(255,107,53,.1); color:var(--gpx); }
.btn-fit:hover { background:rgba(255,107,53,.2); }
.btn-del2 { border-color:rgba(239,68,68,.35); background:transparent; color:var(--danger); }
.btn-del2:hover { background:rgba(239,68,68,.15); }

/* GPX drop zone (inside panel) */
.gpx-drop-zone { margin:6px; border:1px dashed rgba(255,107,53,.3); border-radius:7px; padding:12px 8px; text-align:center; cursor:pointer; font-size:14.7px; color:var(--muted); transition:all .2s; }
.gpx-drop-zone:hover,.gpx-drop-zone.over { border-color:var(--gpx); background:rgba(255,107,53,.06); color:var(--gpx); }

/* ── Map ── */
#map { flex:1; background:var(--bg); }

/* ── Info bar ── */
.info-bar { display:flex; align-items:center; gap:12px; padding:0 14px; height:30px; background:var(--panel); border-top:1px solid var(--border); font-size:13.3px; color:var(--muted); flex-shrink:0; font-family:var(--font-mono); overflow:hidden; }
.pill { display:flex; align-items:center; gap:5px; padding:2px 8px; background:rgba(6,182,212,.08); border:1px solid rgba(6,182,212,.2); border-radius:20px; color:var(--accent2); white-space:nowrap; flex-shrink:0; }
.pulse-dot { width:6px; height:6px; border-radius:50%; background:var(--success); animation:pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
.active-url { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.active-url em { color:var(--accent); font-style:normal; }

/* ── Toast ── */
.toast { position:fixed; bottom:42px; left:50%; transform:translateX(-50%) translateY(10px); background:var(--panel2); border:1px solid var(--border); border-radius:8px; padding:6px 16px; font-size:16px; color:var(--text); z-index:9999; opacity:0; transition:all .25s; pointer-events:none; white-space:nowrap; }
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
.toast.err { border-color:var(--danger); color:var(--danger); }
.toast.ok  { border-color:var(--success); color:var(--success); }

/* ── Leaflet overrides ── */
.leaflet-container { background:var(--bg); }
.leaflet-control-zoom { border:1px solid var(--border) !important; border-radius:8px !important; overflow:hidden; box-shadow:0 4px 20px rgba(0,0,0,.4) !important; }
.leaflet-control-zoom a { background:var(--panel) !important; color:var(--text) !important; border-color:var(--border) !important; width:30px !important; height:30px !important; line-height:30px !important; }
.leaflet-control-zoom a:hover { background:rgba(59,130,246,.2) !important; color:var(--accent) !important; }
.leaflet-control-attribution { background:rgba(13,15,20,.85) !important; color:var(--muted) !important; font-size:12px !important; }
.leaflet-control-attribution a { color:var(--accent2) !important; }
.leaflet-control-scale-line { background:rgba(13,15,20,.8) !important; border-color:var(--muted) !important; color:var(--muted) !important; font-size:12px !important; }

/* GPX popup */
.leaflet-popup-content-wrapper { background:var(--panel) !important; border:1px solid var(--border) !important; border-radius:8px !important; color:var(--text) !important; box-shadow:0 4px 20px rgba(0,0,0,.5) !important; font-family:var(--font-ui) !important; font-size:16px !important; }
.leaflet-popup-tip { background:var(--panel) !important; }
.leaflet-popup-close-button { color:var(--muted) !important; }
.gpx-pop-title { font-weight:700; font-size:17.3px; margin-bottom:6px; color:var(--gpx); }
.gpx-pop-row { display:flex; justify-content:space-between; gap:10px; margin-bottom:3px; }
.gpx-pop-key { color:var(--muted); }
.gpx-pop-val { font-weight:600; }

#gpxFileInput { display:none; }

/* ── My Maps cards ── */
.mymaps-card { border-radius:7px; border:1px solid rgba(52,168,83,.3); margin-bottom:4px; padding:8px 10px; background:var(--panel2); }
.mymaps-card-hd { display:flex; align-items:center; gap:7px; margin-bottom:4px; }
.mymaps-dot { width:10px; height:10px; border-radius:3px; flex-shrink:0; }
.mymaps-card-name { font-size:16px; font-weight:600; flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; color:var(--text); }
.mymaps-card-del { width:20px; height:20px; border-radius:4px; border:1px solid transparent; background:transparent; color:var(--muted); cursor:pointer; font-size:16px; display:flex; align-items:center; justify-content:center; opacity:0; transition:all .15s; }
.mymaps-card:hover .mymaps-card-del { opacity:1; }
.mymaps-card-del:hover { background:var(--danger); border-color:var(--danger); color:#fff; }
.mymaps-card-url { font-family:var(--font-mono); font-size:11px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-bottom:5px; }
.mymaps-card-actions { display:flex; gap:4px; }
.mymaps-act-btn { flex:1; height:22px; border-radius:4px; font-size:13.3px; cursor:pointer; border:1px solid; font-family:var(--font-ui); }
.btn-mymaps-fit { border-color:rgba(52,168,83,.4); background:rgba(52,168,83,.1); color:#4ade80; }
.btn-mymaps-fit:hover { background:rgba(52,168,83,.2); }
.btn-mymaps-del { border-color:rgba(239,68,68,.35); background:transparent; color:var(--danger); }
.btn-mymaps-del:hover { background:rgba(239,68,68,.15); }
</style>
</head>
<body>
<input type="file" id="gpxFileInput" accept=".gpx" multiple onchange="handleGpxFiles(this.files)">

<!-- ── Header ── -->
<header>
  <div class="logo">🗺 MapViewer Pro</div>
  <div class="hd-div"></div>
  <div style="font-size:14.7px;color:var(--muted)">底圖：OpenStreetMap</div>
  <div class="coords-display"><span id="latVal">—</span> , <span id="lngVal">—</span></div>
</header>

<!-- ── Input Bar ── -->
<div class="input-bar">
  <!-- Mode tabs -->
  <div class="mode-tabs">
    <div class="mode-tab active" id="mt-wmts" onclick="setMode('wmts')">🔌 WMTS</div>
    <div class="mode-tab"        id="mt-xyz"  onclick="setMode('xyz')">🧱 XYZ</div>
    <div class="mode-tab gpx-tab" id="mt-gpx" onclick="setMode('gpx')">📍 GPX</div>
    <div class="mode-tab" id="mt-mymaps" onclick="setMode('mymaps')" style="--tab-color:#34a853">🗺 My Maps</div>
  </div>

  <!-- WMTS zone -->
  <div class="input-zone active" id="zone-wmts">
    <span class="ipt-label">URL</span>
    <div class="url-hist-wrap">
      <input class="ipt ipt-wide" id="wmtsUrl" type="text"
        placeholder="WMTS GetCapabilities 網址，例如：https://wmts.nlsc.gov.tw/wmts"
        value="https://wmts.nlsc.gov.tw/wmts" style="padding-right:30px"/>
      <button class="hist-btn" title="歷史記錄" onclick="toggleHist('wmts',event)">🕘</button>
      <div class="hist-dropdown" id="hist-wmts"></div>
    </div>
    <button class="bar-btn bar-btn-blue" onclick="loadWMTS()">解析圖層</button>
  </div>

  <!-- XYZ zone -->
  <div class="input-zone" id="zone-xyz">
    <span class="ipt-label">URL</span>
    <div class="url-hist-wrap">
      <input class="ipt ipt-wide" id="xyzUrl" type="text"
        placeholder="XYZ 圖磚 URL，支援 {x} {y} {z} 或 {$x} {$y} {$z}" style="padding-right:30px"/>
      <button class="hist-btn" title="歷史記錄" onclick="toggleHist('xyz',event)">🕘</button>
      <div class="hist-dropdown" id="hist-xyz"></div>
    </div>
    <input class="ipt ipt-name" id="xyzName" type="text" placeholder="圖層名稱（選填）"/>
    <button class="bar-btn bar-btn-blue" onclick="addXYZLayer()">＋ 加入</button>
  </div>

  <!-- GPX zone -->
  <div class="input-zone" id="zone-gpx">
    <span class="gpx-zone-hint">拖曳 <em>.gpx</em> 檔至地圖區域，或點擊選取檔案</span>
    <button class="bar-btn bar-btn-orange" onclick="document.getElementById('gpxFileInput').click()">📂 選取 GPX 檔</button>
  </div>

  <!-- My Maps zone -->
  <div class="input-zone" id="zone-mymaps">
    <span class="ipt-label">URL</span>
    <div class="url-hist-wrap">
      <input class="ipt ipt-wide" id="myMapsUrl" type="text"

<div class="info-bar">
  <div class="pill"><div class="pulse-dot"></div>已連線</div>
  <span>縮放 <span id="zoomVal" style="color:var(--accent2)">8</span></span>
  <div class="active-url" id="activeUrl">— 請加入圖層 —</div>
</div>

<div class="toast" id="toast"></div>

<script>
// ─────────────────────────────────────────────
// Constants
const TILE_COLORS = ['#3b82f6','#06b6d4','#22c55e','#f59e0b','#a855f7','#ef4444','#ec4899','#14b8a6'];
const GPX_COLORS  = ['#ff6b35','#ffd166','#06d6a0','#118ab2','#e040fb','#f72585','#4cc9f0'];

// ── Map ──────────────────────────────────────
const map = L.map('map', { center:[23.6978,120.9605], zoom:8 });
L.control.scale({ imperial:false, position:'bottomleft' }).addTo(map);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution:'&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
  maxZoom:19
}).addTo(map);

map.on('mousemove', e => {
  document.getElementById('latVal').textContent = e.latlng.lat.toFixed(5);
  document.getElementById('lngVal').textContent = e.latlng.lng.toFixed(5);
});
map.on('zoomend', () => { document.getElementById('zoomVal').textContent = map.getZoom(); });

// ── State ─────────────────────────────────────
let tileLayers   = [];   // { id, name, url, type:'wmts'|'xyz', lLayer, visible, opacity, color }
let wmtsAvail    = [];   // parsed WMTS layers (not yet added to map)
let wmtsMeta     = {};   // { baseUrl, resourceUrls, kvpUrl }
let gpxTracks    = [];   // { id, name, color, layerGroup, stats, bounds }
let myMapsLayers = [];   // { id, name, url, color, layerGroup, bounds }
let tileUid      = 1;
let gpxColorIdx  = 0;
let myMapsColorIdx = 0;
let activeLayerId= null;

// ── Mode tabs ─────────────────────────────────
let currentMode = 'wmts';
function setMode(m) {
  currentMode = m;
  document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.input-zone').forEach(z => z.classList.remove('active'));
  document.getElementById('mt-' + m).classList.add('active');
  document.getElementById('zone-' + m).classList.add('active');
}

// ── Sidebar section toggle ─────────────────────
function toggleSection(id) {
  const body = document.getElementById(id);
  const caretId = 'caret-' + id.replace('sec-','');
  const caret = document.getElementById(caretId);
  const collapsed = body.classList.toggle('collapsed');
  if (caret) caret.classList.toggle('open', !collapsed);
}

// ── Toast ─────────────────────────────────────
let _tt;
function toast(msg, type='') {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = 'toast show ' + type;
  clearTimeout(_tt); _tt = setTimeout(() => { el.className = 'toast'; }, 2600);
}

// ── Info bar active URL ────────────────────────
function updateInfoBar() {
  const el = document.getElementById('activeUrl');
  const lyr = tileLayers.find(l => l.id === activeLayerId) || tileLayers[tileLayers.length-1];
  if (lyr) el.innerHTML = `<em>${lyr.name}</em>　<span style="color:var(--muted)">[${lyr.type.toUpperCase()}]</span>　${lyr.url}`;
  else el.textContent = '— 請加入圖層 —';
}

// ══════════════════════════════════════════════
//  TILE LAYERS (WMTS + XYZ shared render)
// ══════════════════════════════════════════════

function renderTileList() {
  const list = document.getElementById('tileList');
  document.getElementById('tileCount').textContent = tileLayers.length;

  if (!tileLayers.length) {
    list.innerHTML = '<div class="wmts-empty">尚無圖層</div>';
    updateInfoBar(); return;
  }

  list.innerHTML = '';
  // Display order: top of list = highest layer (last in array)
  [...tileLayers].reverse().forEach(l => {
    const isActive = l.id === activeLayerId;
    const wrap = document.createElement('div');
    wrap.className = 'lyr-item' + (isActive ? ' active' : '');
    wrap.dataset.id = l.id;

    wrap.innerHTML = `
      <div class="lyr-row">
        <div class="drag-handle" title="拖曳調整圖層順序">⠿</div>
        <div class="lyr-vis ${l.visible?'on':''}" style="color:${l.color};border-color:${l.color}"
          title="顯示/隱藏" onclick="toggleTileVis(${l.id},event)"></div>
        <div class="lyr-info">
          <div class="lyr-name">
            ${l.name}
            <span class="lyr-badge ${l.type==='wmts'?'lyr-badge-wmts':'lyr-badge-xyz'}">${l.type.toUpperCase()}</span>
          </div>
          <div class="lyr-url-txt" title="${l.url}">${l.url}</div>
        </div>
        <button class="del-btn" onclick="removeTileLayer(${l.id},event)">✕</button>
      </div>
      <div class="op-row">
        <span>透明度</span>
        <input type="range" class="op-slider" min="0" max="100" value="${Math.round(l.opacity*100)}"
          oninput="setTileOpacity(${l.id},this.value)">
        <span class="op-val" id="ov_${l.id}">${Math.round(l.opacity*100)}%</span>
      </div>`;

    wrap.querySelector('.lyr-row').addEventListener('click', e => {
      if (e.target.classList.contains('lyr-vis') ||
          e.target.classList.contains('del-btn') ||
          e.target.classList.contains('drag-handle')) return;
      activeLayerId = l.id; renderTileList();
    });
    list.appendChild(wrap);
  });

  initDragSort(list);
  updateInfoBar();
}

function toggleTileVis(id, e) {
  e.stopPropagation();
  const l = tileLayers.find(x => x.id===id); if (!l) return;
  l.visible = !l.visible;
  if (l.visible) l.lLayer.addTo(map); else map.removeLayer(l.lLayer);
  renderTileList();
}
function setTileOpacity(id, val) {
  const l = tileLayers.find(x => x.id===id); if (!l) return;
  l.opacity = val/100; l.lLayer.setOpacity(l.opacity);
  const el = document.getElementById('ov_'+id); if (el) el.textContent = val+'%';
}
function removeTileLayer(id, e) {
  e.stopPropagation();
  const idx = tileLayers.findIndex(x => x.id===id); if (idx<0) return;
  map.removeLayer(tileLayers[idx].lLayer); tileLayers.splice(idx,1);
  if (activeLayerId===id) activeLayerId = tileLayers.length ? tileLayers[tileLayers.length-1].id : null;
  renderTileList(); updateWMTSPickList(); toast('圖層已移除');
}

function addTileLayerToMap(url, name, type, opts={}) {
  const color = TILE_COLORS[tileLayers.length % TILE_COLORS.length];
  const lOpts = { maxZoom:20, tileSize:256, opacity:1, attribution:name, ...opts };
  const lLayer = L.tileLayer(url, lOpts).addTo(map);
  gpxTracks.forEach(t => t.layerGroup.bringToFront()); // keep GPX on top
  myMapsLayers.forEach(m => m.layerGroup.bringToFront()); // keep My Maps on top
  const id = tileUid++;
  tileLayers.push({ id, name, url, type, lLayer, visible:true, opacity:1, color });
  activeLayerId = id;
  renderTileList();
  return id;
}

// ══════════════════════════════════════════════
//  XYZ MODE
// ══════════════════════════════════════════════

function normalizeXYZ(url) {
  return url.replace(/\{\$x\}/gi,'{x}').replace(/\{\$y\}/gi,'{y}')
            .replace(/\{\$z\}/gi,'{z}').replace(/\{\$s\}/gi,'{s}');
}

function addXYZLayer() {
  const raw  = document.getElementById('xyzUrl').value.trim();
  let   name = document.getElementById('xyzName').value.trim();
  if (!raw) { toast('請輸入圖磚 URL','err'); return; }
  const url  = normalizeXYZ(raw);
  if (!url.includes('{x}')||!url.includes('{y}')||!url.includes('{z}')) {
    toast('URL 需包含 {x}、{y}、{z}','err'); return;
  }
  if (!name) name = '圖層 ' + tileUid;
  const opts = {};
  if (url.includes('{s}')) {
    if (/google\.com/.test(url))   opts.subdomains=['0','1','2','3'];
    else if (/tianditu/.test(url)) opts.subdomains=['0','1','2','3','4','5','6','7'];
    else                           opts.subdomains=['a','b','c'];
  }
  addTileLayerToMap(url, name, 'xyz', opts);
  document.getElementById('xyzUrl').value = '';
  document.getElementById('xyzName').value = '';
  toast(`✓ 已加入：${name}`,'ok');
}

// ══════════════════════════════════════════════
//  WMTS MODE
// ══════════════════════════════════════════════

function getText(el, tag) { const n=el.querySelector(tag); return n?n.textContent.trim():''; }

function parseCapabilities(xmlText) {
  const xml=new DOMParser().parseFromString(xmlText,'text/xml'), layers=[];
  xml.querySelectorAll('Layer').forEach(layer=>{
    const id=getText(layer,'Identifier')||getText(layer,'ows\\:Identifier'); if(!id)return;
    const title=getText(layer,'Title')||getText(layer,'ows\\:Title')||id;
    const abstract=getText(layer,'Abstract')||getText(layer,'ows\\:Abstract')||'';
    const formats=[...layer.querySelectorAll('Format')].map(f=>f.textContent.trim());
    const tmsLinks=[...layer.querySelectorAll('TileMatrixSetLink')].map(t=>getText(t,'TileMatrixSet')||getText(t,'ows\\:TileMatrixSet'));
    const styles=[...layer.querySelectorAll('Style')].map(s=>getText(s,'Identifier')||getText(s,'ows\\:Identifier'));
    let bbox=null;
    const bboxEl=layer.querySelector('WGS84BoundingBox')||layer.querySelector('BoundingBox');
    if(bboxEl){const lc=getText(bboxEl,'LowerCorner'),uc=getText(bboxEl,'UpperCorner');if(lc&&uc){const[x0,y0]=lc.split(' ').map(Number),[x1,y1]=uc.split(' ').map(Number);bbox=[[y0,x0],[y1,x1]];}}
    layers.push({id,title,abstract,formats,tmsLinks,styles,bbox});
  });
  const resourceUrls={};
  xml.querySelectorAll('ResourceURL').forEach(r=>{const l=r.closest('Layer');if(!l)return;const id=getText(l,'Identifier')||getText(l,'ows\\:Identifier');if(!resourceUrls[id])resourceUrls[id]=r.getAttribute('template');});
  const opEl=xml.querySelector('OperationsMetadata Operation[name="GetTile"]')||xml.querySelector('Operation[name="GetTile"]');
  let kvpUrl='';if(opEl){const g=opEl.querySelector('Get');if(g)kvpUrl=g.getAttribute('xlink:href')||'';}
  return{layers,resourceUrls,kvpUrl};
}

function buildWMTSTileUrl(baseUrl,layerId,style,tms,format){
  const url=baseUrl.split('?')[0].replace(/\/+$/,'');
  if(url.includes('{TileMatrix}')||url.includes('{z}'))return url;
  return`${url}?SERVICE=WMTS&REQUEST=GetTile&VERSION=1.0.0&LAYER=${encodeURIComponent(layerId)}&STYLE=${encodeURIComponent(style||'default')}&TILEMATRIXSET=${encodeURIComponent(tms||'GoogleMapsCompatible')}&TILEMATRIX={z}&TILEROW={y}&TILECOL={x}&FORMAT=${encodeURIComponent(format||'image/png')}`;
}

async function fetchCapabilities(url){
  try{const r=await fetch(url,{mode:'cors',signal:AbortSignal.timeout(10000)});if(r.ok)return await r.text();}catch(_){}
  const enc=encodeURIComponent(url);
  for(const p of[
    `https://corsproxy.io/?${enc}`,
    `https://api.allorigins.win/raw?url=${enc}`,
    `https://thingproxy.freeboard.io/fetch/${url}`,
    `https://api.codetabs.com/v1/proxy?quest=${enc}`
  ]){
    try{const r=await fetch(p,{signal:AbortSignal.timeout(12000)});if(r.ok)return await r.text();}catch(_){}
  }
  throw new Error('無法取得 Capabilities');
}

async function loadWMTS() {
  let url = document.getElementById('wmtsUrl').value.trim();
  if (!url) { toast('請輸入 WMTS 網址','err'); return; }
  const capUrl = url.includes('?')
    ? (url.toLowerCase().includes('getcapabilities')?url:url+'&SERVICE=WMTS&REQUEST=GetCapabilities&VERSION=1.0.0')
    : url+'?SERVICE=WMTS&REQUEST=GetCapabilities&VERSION=1.0.0';

  toast('正在解析 WMTS…');
  try {
    const xmlText = await fetchCapabilities(capUrl);
    const {layers,resourceUrls,kvpUrl} = parseCapabilities(xmlText);
    if (!layers.length) throw new Error('未找到圖層');
    wmtsAvail = layers;
    wmtsMeta  = { baseUrl:url, resourceUrls, kvpUrl };
    document.getElementById('wmtsCount').textContent = layers.length;
    updateWMTSPickList();
    toast(`✓ 解析完成，共 ${layers.length} 個圖層`,'ok');
  } catch(err) {
    toast('解析失敗：'+err.message,'err');
    document.getElementById('wmtsPickList').innerHTML=`<div class="wmts-empty" style="color:var(--danger)">⚠️ ${err.message}</div>`;
  }
}

function updateWMTSPickList() {
  const list = document.getElementById('wmtsPickList');
  if (!wmtsAvail.length) {
    list.innerHTML='<div class="wmts-empty">請輸入 WMTS 網址<br>並點擊「解析圖層」</div>';
    return;
  }
  list.innerHTML='';
  wmtsAvail.forEach(layer => {
    const added = tileLayers.some(l => l.url && l.url.includes(layer.id));
    const item  = document.createElement('div');
    item.className = 'wmts-pick-item' + (added?' added':'');
    item.innerHTML = `
      <div class="wmts-pick-name" title="${layer.id}">${layer.title}</div>
      <div class="wmts-pick-add">${added?'✓':'＋'}</div>`;
    if (!added) item.onclick = () => addWMTSLayer(layer);
    list.appendChild(item);
  });
}

function addWMTSLayer(layer) {
  const style=layer.styles[0]||'default', tms=layer.tmsLinks[0]||'GoogleMapsCompatible';
  const fmt=layer.formats.find(f=>f.includes('png')||f.includes('jpeg'))||layer.formats[0]||'image/png';
  const {baseUrl,resourceUrls,kvpUrl}=wmtsMeta;
  let tileUrl;
  if(resourceUrls[layer.id]){
    tileUrl=resourceUrls[layer.id].replace('{TileMatrix}','{z}').replace('{TileRow}','{y}').replace('{TileCol}','{x}').replace('{Style}',style).replace('{TileMatrixSet}',tms);
  }else{tileUrl=buildWMTSTileUrl(kvpUrl||baseUrl,layer.id,style,tms,fmt);}
  addTileLayerToMap(tileUrl, layer.title, 'wmts');
  if(layer.bbox){try{map.fitBounds(layer.bbox);}catch(_){}}
  updateWMTSPickList();
  toast(`✓ 已加入：${layer.title}`,'ok');
}

// ══════════════════════════════════════════════
//  GPX
// ══════════════════════════════════════════════

function dzOver(e){ e.preventDefault(); document.getElementById('gpxDropZone').classList.add('over'); }
function dzLeave(){ document.getElementById('gpxDropZone').classList.remove('over'); }
function dzDrop(e){
  e.preventDefault(); dzLeave();
  const files=[...e.dataTransfer.files].filter(f=>f.name.toLowerCase().endsWith('.gpx'));
  if(!files.length){toast('請放入 .gpx 檔案','err');return;}
  handleGpxFiles(files);
}
function handleGpxFiles(files){
  [...files].forEach(f=>{const r=new FileReader();r.onload=e=>parseAndAddGpx(f.name,e.target.result);r.readAsText(f);});
}

function parseAndAddGpx(filename,xmlText){
  const xml=new DOMParser().parseFromString(xmlText,'text/xml');
  const color=GPX_COLORS[gpxColorIdx%GPX_COLORS.length]; gpxColorIdx++;
  const trackName=xml.querySelector('name')?.textContent?.trim()||filename.replace(/\.gpx$/i,'');

  const allSegments=[];
  xml.querySelectorAll('trk trkseg').forEach(seg=>{
    const pts=[...seg.querySelectorAll('trkpt')].map(pt=>({lat:parseFloat(pt.getAttribute('lat')),lon:parseFloat(pt.getAttribute('lon')),ele:parseFloat(pt.querySelector('ele')?.textContent??0),time:pt.querySelector('time')?.textContent??null})).filter(p=>!isNaN(p.lat)&&!isNaN(p.lon));
    if(pts.length)allSegments.push(pts);
  });
  xml.querySelectorAll('rte').forEach(rte=>{
    const pts=[...rte.querySelectorAll('rtept')].map(pt=>({lat:parseFloat(pt.getAttribute('lat')),lon:parseFloat(pt.getAttribute('lon')),ele:parseFloat(pt.querySelector('ele')?.textContent??0),time:null})).filter(p=>!isNaN(p.lat)&&!isNaN(p.lon));
    if(pts.length)allSegments.push(pts);
  });
  const waypoints=[...xml.querySelectorAll('wpt')].map(wpt=>({lat:parseFloat(wpt.getAttribute('lat')),lon:parseFloat(wpt.getAttribute('lon')),name:wpt.querySelector('name')?.textContent?.trim()??'',ele:parseFloat(wpt.querySelector('ele')?.textContent??0)})).filter(p=>!isNaN(p.lat)&&!isNaN(p.lon));

  const allPts=allSegments.flat();
  if(!allPts.length&&!waypoints.length){toast(`「${filename}」無有效軌跡點`,'err');return;}

  const lg=L.layerGroup();
  allSegments.forEach(seg=>{
    const ll=seg.map(p=>[p.lat,p.lon]);
    L.polyline(ll,{color:'#000',weight:5,opacity:0.2,lineJoin:'round',lineCap:'round'}).addTo(lg);
    L.polyline(ll,{color,weight:3,opacity:0.95,lineJoin:'round',lineCap:'round'}).addTo(lg);
  });

  const mkIcon=(emoji,bg)=>L.divIcon({html:`<div style="width:24px;height:24px;border-radius:50%;background:${bg};border:2px solid #fff;display:flex;align-items:center;justify-content:center;font-size:14.7px;box-shadow:0 2px 8px rgba(0,0,0,.5)">${emoji}</div>`,className:'',iconSize:[24,24],iconAnchor:[12,12]});

  if(allPts.length){
    const s=allPts[0],e=allPts[allPts.length-1];
    L.marker([s.lat,s.lon],{icon:mkIcon('▶','#22c55e'),zIndexOffset:2000}).bindPopup(gpxPopup('▶ 起點',trackName,s)).addTo(lg);
    if(s.lat!==e.lat||s.lon!==e.lon) L.marker([e.lat,e.lon],{icon:mkIcon('■','#ef4444'),zIndexOffset:2000}).bindPopup(gpxPopup('■ 終點',trackName,e)).addTo(lg);
  }
  waypoints.forEach(wpt=>{
    const icon=L.divIcon({html:`<div style="width:20px;height:20px;border-radius:50%;background:#ffd166;border:2px solid #fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#000;box-shadow:0 1px 5px rgba(0,0,0,.4)">W</div>`,className:'',iconSize:[20,20],iconAnchor:[10,10]});
    L.marker([wpt.lat,wpt.lon],{icon,zIndexOffset:1900}).bindPopup(`<div class="gpx-pop-title">📍 ${wpt.name||'航點'}</div><div class="gpx-pop-row"><span class="gpx-pop-key">座標</span><span class="gpx-pop-val">${wpt.lat.toFixed(5)}, ${wpt.lon.toFixed(5)}</span></div>${wpt.ele?`<div class="gpx-pop-row"><span class="gpx-pop-key">海拔</span><span class="gpx-pop-val">${wpt.ele.toFixed(0)} m</span></div>`:''}`).addTo(lg);
  });

  lg.addTo(map);
  const stats=computeStats(allPts);
  const allLL=[...allPts.map(p=>[p.lat,p.lon]),...waypoints.map(p=>[p.lat,p.lon])];
  const bounds=allLL.length?L.latLngBounds(allLL):null;
  const id='gpx-'+Date.now()+'-'+Math.random().toString(36).slice(2,6);
  gpxTracks.push({id,name:trackName,color,layerGroup:lg,stats,bounds});
  renderGpxList(); if(bounds)map.fitBounds(bounds,{padding:[30,30]});
  toast(`✓ 已載入 GPX：${trackName}（${stats.distKm} km）`,'ok');
}

function gpxPopup(label,track,pt){return`<div class="gpx-pop-title">${label}</div><div class="gpx-pop-row"><span class="gpx-pop-key">軌跡</span><span class="gpx-pop-val">${track}</span></div>${pt.ele?`<div class="gpx-pop-row"><span class="gpx-pop-key">海拔</span><span class="gpx-pop-val">${pt.ele.toFixed(0)} m</span></div>`:''}${pt.time?`<div class="gpx-pop-row"><span class="gpx-pop-key">時間</span><span class="gpx-pop-val">${fmtTime(pt.time)}</span></div>`:''}`;
}
function computeStats(pts){if(pts.length<2)return{distKm:'0.00',elevGain:0,elevLoss:0,ptCount:pts.length};let dist=0,gain=0,loss=0;for(let i=1;i<pts.length;i++){dist+=haversine(pts[i-1].lat,pts[i-1].lon,pts[i].lat,pts[i].lon);const de=(pts[i].ele||0)-(pts[i-1].ele||0);if(de>0)gain+=de;else loss+=Math.abs(de);}return{distKm:(dist/1000).toFixed(2),elevGain:Math.round(gain),elevLoss:Math.round(loss),ptCount:pts.length};}
function haversine(lat1,lon1,lat2,lon2){const R=6371000,dLat=(lat2-lat1)*Math.PI/180,dLon=(lon2-lon1)*Math.PI/180;const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));}
function fmtTime(iso){try{return new Date(iso).toLocaleString('zh-TW',{dateStyle:'short',timeStyle:'short'});}catch{return iso;}}

// ══════════════════════════════════════════════
//  DRAG-TO-REORDER (desktop — mouse events)
// ══════════════════════════════════════════════

(function () {
  let dragging  = false;
  let srcId     = null;
  let ghost     = null;   // floating clone that follows cursor
  let offsetX   = 0, offsetY = 0;
  let lastTarget = null;  // last hovered .lyr-item

  function getList() { return document.getElementById('tileList'); }

  function clearIndicators() {
    getList().querySelectorAll('.drag-over-top,.drag-over-bottom')
      .forEach(el => el.classList.remove('drag-over-top','drag-over-bottom'));
  }

  function createGhost(item, mouseX, mouseY) {
    const rect = item.getBoundingClientRect();
    ghost = item.cloneNode(true);
    ghost.style.cssText = `
      position:fixed; left:${rect.left}px; top:${rect.top}px;
      width:${rect.width}px; z-index:9999; pointer-events:none;
      opacity:0.85; box-shadow:0 6px 24px rgba(0,0,0,0.5);
      border:1px solid var(--accent); border-radius:7px;
      background:var(--panel); transition:none;`;
    document.body.appendChild(ghost);
    offsetX = mouseX - rect.left;
    offsetY = mouseY - rect.top;
  }

  // Attach mousedown only to the drag handle
  function bindHandle(handle) {
    handle.addEventListener('mousedown', e => {
      if (e.button !== 0) return;
      e.preventDefault();
      e.stopPropagation();

      const item = handle.closest('.lyr-item');
      srcId = parseInt(item.dataset.id);
      dragging = true;

      createGhost(item, e.clientX, e.clientY);
      item.classList.add('dragging-ghost');
    });
  }

  document.addEventListener('mousemove', e => {
    if (!dragging || !ghost) return;

    ghost.style.left = (e.clientX - offsetX) + 'px';
    ghost.style.top  = (e.clientY - offsetY) + 'px';

    // Hide ghost temporarily to hit-test what's underneath
    ghost.style.visibility = 'hidden';
    const el = document.elementFromPoint(e.clientX, e.clientY);
    ghost.style.visibility = '';

    const targetItem = el?.closest('.lyr-item');
    clearIndicators();

    if (targetItem && targetItem.dataset.id && parseInt(targetItem.dataset.id) !== srcId) {
      lastTarget = targetItem;
      const rect = targetItem.getBoundingClientRect();
      const onTop = (e.clientY - rect.top) < rect.height / 2;
      targetItem.classList.add(onTop ? 'drag-over-top' : 'drag-over-bottom');
    } else {
      lastTarget = null;
    }
  });

  document.addEventListener('mouseup', e => {
    if (!dragging) return;
    dragging = false;

    // Remove ghost
    if (ghost) { ghost.remove(); ghost = null; }

    // Remove ghost styling from source item
    const list = getList();
    const srcItem = list.querySelector(`.lyr-item[data-id="${srcId}"]`);
    if (srcItem) srcItem.classList.remove('dragging-ghost');

    // Perform reorder if there's a valid target
    if (lastTarget) {
      const targetId = parseInt(lastTarget.dataset.id);
      const onTop    = lastTarget.classList.contains('drag-over-top');
      clearIndicators();

      const srcIdx = tileLayers.findIndex(l => l.id === srcId);
      if (srcIdx >= 0) {
        const [moved] = tileLayers.splice(srcIdx, 1);
        const newTgtIdx = tileLayers.findIndex(l => l.id === targetId);
        if (newTgtIdx >= 0) {
          // UI top = higher z = later in array → insert after target when dropping on top
          tileLayers.splice(onTop ? newTgtIdx + 1 : newTgtIdx, 0, moved);
          syncMapZOrder();
        } else {
          tileLayers.splice(srcIdx, 0, moved); // restore if target gone
        }
      }
    } else {
      clearIndicators();
    }

    lastTarget = null;
    srcId = null;
    renderTileList();
  });

  // Re-bind after every render
  const _origRender = renderTileList;
  // initDragSort is called at the end of renderTileList — just expose bindHandle
  window._bindDragHandle = bindHandle;
})();

function initDragSort(list) {
  list.querySelectorAll('.drag-handle').forEach(h => window._bindDragHandle(h));
}

// Sync Leaflet z-order to match tileLayers array order (index 0 = bottom)
function syncMapZOrder() {
  tileLayers.forEach(l => { if (l.visible) l.lLayer.bringToFront(); });
  // GPX and My Maps always on very top
  if (typeof gpxTracks !== 'undefined')
    gpxTracks.forEach(t => t.layerGroup.bringToFront());
  if (typeof myMapsLayers !== 'undefined')
    myMapsLayers.forEach(m => m.layerGroup.bringToFront());
}

const HIST_MAX = 10;

function histLoad(type) {
  try { return JSON.parse(localStorage.getItem(HIST_KEY[type]) || '[]'); } catch { return []; }

function histSave(type, list) {
  try { localStorage.setItem(HIST_KEY[type], JSON.stringify(list)); } catch {}
}
function histAdd(type, url) {
  if (!url) return;
  let list = histLoad(type).filter(u => u !== url);  // remove duplicate
  list.unshift(url);                                  // newest first
  if (list.length > HIST_MAX) list = list.slice(0, HIST_MAX);
  histSave(type, list);

}

// ══════════════════════════════════════════════
//  GOOGLE MY MAPS
// ══════════════════════════════════════════════

const MYMAPS_COLORS = ['#34a853','#fbbc04','#ea4335','#4285f4','#9c27b0','#ff9800','#00bcd4','#e91e63'];

function parseMyMapsUrl(rawUrl) {
  // Accepts several formats:
  // 1) Full share URL: https://www.google.com/maps/@.../data=...!1s<MAP_ID>...
  // 2) Short share URL: https://goo.gl/maps/...
  // 3) Direct KML export: https://www.google.com/maps/d/kml?mid=<MAP_ID>
  // 4) View URL: https://www.google.com/maps/d/viewer?mid=<MAP_ID>
  // 5) Edit URL: https://www.google.com/maps/d/edit?mid=<MAP_ID>

  let mid = null;

  // Try to find mid= parameter
  try {
    const u = new URL(rawUrl);
    mid = u.searchParams.get('mid');
  } catch(_) {}

  if (!mid) {
    // Try to extract from data= section: !1s<MAP_ID>?entry (Google My Maps embed)
    // Pattern: data=...!1s followed by the map ID
    const m1 = rawUrl.match(/!1s([A-Za-z0-9_\-]{20,})/);
    if (m1) mid = m1[1];
  }

  if (!mid) {
    // Try /maps/d/<mid> pattern
    const m2 = rawUrl.match(/\/maps\/d\/(?:viewer|edit|kml|embed)?\/?(?:\?.*mid=)?([A-Za-z0-9_\-]{20,})/);
    if (m2) mid = m2[1];
  }

  if (!mid) return null;

  return `https://www.google.com/maps/d/kml?forcekml=1&mid=${encodeURIComponent(mid)}`;
}

// ── KML cache：避免同一張地圖重複消耗 proxy 配額 ──
const _kmlCache = new Map();  // kmlUrl → kmlText

// ── Proxy 清單：依序嘗試，輪替使用避免單一服務被鎖 ──
function buildProxyList(kmlUrl) {
  const enc = encodeURIComponent(kmlUrl);
  return [
    `https://corsproxy.io/?${enc}`,
    `https://api.allorigins.win/raw?url=${enc}`,
    `https://thingproxy.freeboard.io/fetch/${kmlUrl}`,
    `https://api.codetabs.com/v1/proxy?quest=${enc}`,
    `https://yacdn.org/proxy/${kmlUrl}`,
  ];
}

async function fetchKmlWithFallback(kmlUrl) {
  // 1. 記憶體快取：完全不走網路
  if (_kmlCache.has(kmlUrl)) return _kmlCache.get(kmlUrl);

  const proxies = buildProxyList(kmlUrl);
  const errors  = [];

  for (const proxy of proxies) {
    try {
      const r = await fetch(proxy, { signal: AbortSignal.timeout(12000) });
      if (r.status === 429) { errors.push(`${new URL(proxy).hostname}: 請求過多(429)`); continue; }
      if (!r.ok)            { errors.push(`${new URL(proxy).hostname}: HTTP ${r.status}`); continue; }
      const text = await r.text();
      // 檢查是否真的是 KML/XML，而不是錯誤頁面
      if (!text.includes('<kml') && !text.includes('<Kml') && !text.includes('<?xml')) {
        errors.push(`${new URL(proxy).hostname}: 回傳非 KML 內容`); continue;
      }
      _kmlCache.set(kmlUrl, text);   // 存入快取
      return text;
    } catch(e) {
      errors.push(`${new URL(proxy).hostname}: ${e.message}`);
    }
  }

  // 所有 proxy 都失敗，回傳詳細錯誤
  throw new Error('所有代理伺服器均失敗：\n' + errors.join('\n'));
}

async function addMyMapsLayer() {
  const rawUrl = document.getElementById('myMapsUrl').value.trim();
  let   name   = document.getElementById('myMapsName').value.trim();
  if (!rawUrl) { toast('請輸入 Google My Maps 分享連結', 'err'); return; }

  const kmlUrl = parseMyMapsUrl(rawUrl);
  if (!kmlUrl) {
    toast('無法解析 My Maps 連結，請確認格式', 'err');
    return;
  }

  if (!name) name = 'My Maps ' + (myMapsLayers.length + 1);

  // 更新按鈕狀態
  const btn = document.querySelector('#zone-mymaps .bar-btn');
  const origText = btn.textContent;
  btn.textContent = '載入中…'; btn.disabled = true;
  toast('正在載入 My Maps…');

  try {
    const kmlText = await fetchKmlWithFallback(kmlUrl);
    parseAndAddKml(kmlText, name, rawUrl);
    myMapsHistAdd(rawUrl, name);           // ← 記錄歷史
    document.getElementById('myMapsUrl').value = '';
    document.getElementById('myMapsName').value = '';
  } catch(err) {
    const shortMsg = err.message.split('\n')[0];
    toast(`載入失敗：${shortMsg}`, 'err');
    console.error('[My Maps]', err.message);
    // 如果是快取命中但 parse 失敗，清除快取讓下次重試
    _kmlCache.delete(kmlUrl);
  } finally {
    btn.textContent = origText; btn.disabled = false;
  }
}

function parseAndAddKml(kmlText, name, sourceUrl) {
  const xml = new DOMParser().parseFromString(kmlText, 'text/xml');
  if (xml.querySelector('parsererror')) {
    toast('KML 格式錯誤', 'err'); return;
  }

  const color = MYMAPS_COLORS[myMapsColorIdx % MYMAPS_COLORS.length];
  myMapsColorIdx++;

  const lg = L.layerGroup();
  const allLatLngs = [];

  // Parse Placemarks
  xml.querySelectorAll('Placemark').forEach(pm => {
    const pmName = pm.querySelector('name')?.textContent?.trim() || '';
    const desc   = pm.querySelector('description')?.textContent?.trim() || '';
    const popup  = `<div style="font-weight:700;margin-bottom:4px">${pmName}</div>${desc ? `<div style="font-size:13.3px;color:var(--muted)">${desc}</div>` : ''}`;

    // Try to get style color from StyleMap or Style
    let pmColor = color;
    const styleUrl = pm.querySelector('styleUrl')?.textContent?.trim().replace('#','');
    if (styleUrl) {
      const styleSel = xml.querySelector(`Style[id="${styleUrl}"] IconStyle color, Style[id="${styleUrl}"] LineStyle color, Style[id="${styleUrl}"] PolyStyle color`);
      if (styleSel) {
        const kmlColor = styleSel.textContent.trim(); // aabbggrr format
        if (kmlColor.length === 8) {
          const r = parseInt(kmlColor.slice(6,8),16);
          const g = parseInt(kmlColor.slice(4,6),16);
          const b = parseInt(kmlColor.slice(2,4),16);
          pmColor = `rgb(${r},${g},${b})`;
        }
      }
    }

    // Point
    const pt = pm.querySelector('Point coordinates');
    if (pt) {
      const [lng, lat] = pt.textContent.trim().split(',').map(Number);
      if (!isNaN(lat) && !isNaN(lng)) {
        allLatLngs.push([lat, lng]);
        const icon = L.divIcon({
          html:`<div style="width:22px;height:22px;border-radius:50%;background:${pmColor};border:2.5px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;font-size:11px">📍</div>`,
          className:'', iconSize:[22,22], iconAnchor:[11,11]
        });
        L.marker([lat,lng],{icon,zIndexOffset:1500}).bindPopup(popup).addTo(lg);
      }
    }

    // LineString
    pm.querySelectorAll('LineString coordinates').forEach(cs => {
      const lls = cs.textContent.trim().split(/\s+/).map(c => {
        const [lng2,lat2] = c.split(',').map(Number);
        return (!isNaN(lat2)&&!isNaN(lng2)) ? [lat2,lng2] : null;
      }).filter(Boolean);
      if (lls.length > 1) {
        allLatLngs.push(...lls);
        L.polyline(lls, {color:'#000',weight:4,opacity:0.2}).addTo(lg);
        L.polyline(lls, {color:pmColor,weight:2.5,opacity:0.9}).addTo(lg);
      }
    });

    // Polygon
    pm.querySelectorAll('Polygon outerBoundaryIs LinearRing coordinates').forEach(cs => {
      const lls = cs.textContent.trim().split(/\s+/).map(c => {
        const [lng2,lat2] = c.split(',').map(Number);
        return (!isNaN(lat2)&&!isNaN(lng2)) ? [lat2,lng2] : null;
      }).filter(Boolean);
      if (lls.length > 2) {
        allLatLngs.push(...lls);
        L.polygon(lls, {color:pmColor,weight:2,opacity:0.85,fillOpacity:0.2,fillColor:pmColor})
          .bindPopup(popup).addTo(lg);
      }
    });
  });

  lg.addTo(map);
  const bounds = allLatLngs.length ? L.latLngBounds(allLatLngs) : null;
  const id = 'mm-' + Date.now() + '-' + Math.random().toString(36).slice(2,6);
  myMapsLayers.push({ id, name, url: sourceUrl, color, layerGroup: lg, bounds });
  renderMyMapsList();
  if (bounds) map.fitBounds(bounds, { padding:[30,30] });
  toast(`✓ 已載入 My Maps：${name}（${allLatLngs.length} 個點位）`, 'ok');
}

function renderMyMapsList() {
  const list = document.getElementById('myMapsList');
  document.getElementById('myMapsCount').textContent = myMapsLayers.length;
  if (!myMapsLayers.length) {
    list.innerHTML = '<div class="wmts-empty">尚無 My Maps 圖層</div>';
    return;
  }
  list.innerHTML = '';
  myMapsLayers.forEach(m => {
    const card = document.createElement('div');
    card.className = 'mymaps-card';
    card.innerHTML = `
      <div class="mymaps-card-hd">
        <div class="mymaps-dot" style="background:${m.color}"></div>
        <div class="mymaps-card-name" title="${m.name}">${m.name}</div>
        <button class="mymaps-card-del" onclick="removeMyMaps('${m.id}')">✕</button>
      </div>
      <div class="mymaps-card-url" title="${m.url}">${m.url}</div>
      <div class="mymaps-card-actions">
        <button class="mymaps-act-btn btn-mymaps-fit" onclick="fitMyMaps('${m.id}')">🔍 縮放</button>
        <button class="mymaps-act-btn btn-mymaps-del" onclick="removeMyMaps('${m.id}')">✕ 移除</button>
      </div>`;
    list.appendChild(card);
  });
}

function fitMyMaps(id) {
  const m = myMapsLayers.find(m => m.id===id);
  if (m?.bounds) map.fitBounds(m.bounds, {padding:[30,30]});
}

function removeMyMaps(id) {
  const i = myMapsLayers.findIndex(m => m.id===id);
  if (i===-1) return;
  map.removeLayer(myMapsLayers[i].layerGroup);
  myMapsLayers.splice(i,1);
  renderMyMapsList();
  toast('My Maps 圖層已移除');
}

// ── Init ──────────────────────────────────────
renderTileList();
renderGpxList();
</script>
</body>
</html>
